name: 每日收益榜抓取

on:
  schedule:
    - cron: '59 15 * * *'  # 北京时间23:59 存快照
    - cron: '5 16 * * *'   # 北京时间00:05 抓今日+更新昨日
  workflow_dispatch:

jobs:
  snapshot:
    if: github.event.schedule == '59 15 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 lxml
      - name: 存快照
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python jj_ranking_snapshot.py

  crawl:
    if: github.event.schedule == '5 16 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 lxml
      - name: 抓今日榜单
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python jj_ranking_monitor.py