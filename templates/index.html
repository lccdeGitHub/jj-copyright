function normalizeBookmarkTags(raw) {
  if (Array.isArray(raw)) {
    return [...new Set(raw.map(v => String(v || '').trim()).filter(Boolean))];
  }
  return [...new Set(String(raw || '')
    .split(/[，,|/\s]+/)
    .map(v => v.trim())
    .filter(Boolean))];
}

function buildBookmarkPresetTags() {
  const row = document.getElementById('bookmarkPresetTags');
  row.innerHTML = BOOKMARK_PRESET_TAGS.map(tag =>
    `<button class="tag-chip" type="button" onclick="appendBookmarkTag('${tag}')">${tag}</button>`
  ).join('');
}

function buildBookmarkTagFilters() {
  const row = document.getElementById('bookmarkTagRow');
  const dynTags = new Set();
  (Array.isArray(allBookmarks) ? allBookmarks : []).forEach(item => {
    normalizeBookmarkTags(item.tags).forEach(tag => dynTags.add(tag));
  });
  BOOKMARK_PRESET_TAGS.forEach(tag => dynTags.add(tag));
  const tags = ['全部', ...Array.from(dynTags).sort((a, b) => a.localeCompare(b, 'zh-CN'))];
  row.innerHTML = tags.map(tag => {
    const active = (tag === '全部' && !selectedBookmarkTag) || selectedBookmarkTag === tag;
    return `<button class="filter-btn ${active ? 'active' : ''}" data-bookmark-tag="${tag}" onclick="setBookmarkTag('${tag}')">${tag}</button>`;
  }).join('');
}

function setBookmarkTag(tag) {
  selectedBookmarkTag = tag === '全部' ? '' : tag;
  document.querySelectorAll('#bookmarkTagRow .filter-btn').forEach(btn => btn.classList.remove('active'));
  const activeVal = selectedBookmarkTag || '全部';
  const target = document.querySelector(`#bookmarkTagRow .filter-btn[data-bookmark-tag="${activeVal}"]`);
  if (target) target.classList.add('active');
  renderBookmarks();
}

function appendBookmarkTag(tag) {
  const input = document.getElementById('bmTags');
  if (!input) return;
  const tags = normalizeBookmarkTags(input.value);
  if (!tags.includes(tag)) tags.push(tag);
  input.value = tags.join(', ');
}

function openBookmarkModal() {
  document.getElementById('bmUrl').value = '';
  document.getElementById('bmTitle').value = '';
  document.getElementById('bmDesc').value = '';
  document.getElementById('bmTags').value = '';
  document.getElementById('bmNote').value = '';
  document.getElementById('bookmarkModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeBookmarkModal() {
  document.getElementById('bookmarkModal').classList.remove('open');
  if (!document.getElementById('modalOverlay').classList.contains('open') && !document.getElementById('mediaNoteModal').classList.contains('open')) {
    document.body.style.overflow = '';
  }
}

async function saveBookmark() {
  const urlEl = document.getElementById('bmUrl');
  const titleEl = document.getElementById('bmTitle');
  const descEl = document.getElementById('bmDesc');
  const tagsEl = document.getElementById('bmTags');
  const noteEl = document.getElementById('bmNote');
  const btn = document.getElementById('bookmarkSaveBtn');

  const url = String(urlEl.value || '').trim();
  if (!url) {
    urlEl.focus();
    return;
  }

  const payload = {
    url,
    title: String(titleEl.value || '').trim(),
    description: String(descEl.value || '').trim(),
    tags: normalizeBookmarkTags(tagsEl.value).join(', '),
    note: String(noteEl.value || '').trim(),
  };

  btn.disabled = true;
  const original = btn.textContent;
  try {
    const res = await fetch('/api/bookmarks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('save bookmark failed');

    const listRes = await fetch('/api/bookmarks');
    allBookmarks = await listRes.json();
    buildBookmarkTagFilters();
    renderBookmarks();

    btn.textContent = '已保存✓';
    setTimeout(() => {
      btn.textContent = original;
      btn.disabled = false;
      closeBookmarkModal();
    }, 900);
  } catch (e) {
    console.error('保存收藏失败', e);
    btn.textContent = '保存失败';
    setTimeout(() => {
      btn.textContent = original;
      btn.disabled = false;
    }, 1200);
  }
}

function bookmarkTagStyle(tag) {
  const seed = hashText(tag);
  const hue = seed % 360;
  return `color:hsl(${hue}, 48%, 34%);background:hsl(${hue}, 85%, 94%);border-color:hsl(${hue}, 60%, 80%);`;
}

async function deleteBookmark(id) {
  if (!id) return;
  if (!window.confirm('确定删除这条收藏吗？')) return;
  try {
    const res = await fetch(`/api/bookmarks/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('delete bookmark failed');
    allBookmarks = (Array.isArray(allBookmarks) ? allBookmarks : []).filter(item => Number(item.id) !== Number(id));
    buildBookmarkTagFilters();
    renderBookmarks();
  } catch (e) {
    console.error('删除收藏失败', e);
  }
}

function renderBookmarks() {
  const list = document.getElementById('bookmarkList');
  const q = document.getElementById('search').value.trim().toLowerCase();
  const source = Array.isArray(allBookmarks) ? [...allBookmarks] : [];
  source.sort((a, b) => Number(b.id || 0) - Number(a.id || 0));

  filteredBookmarks = source.filter(item => {
    const tags = normalizeBookmarkTags(item.tags);
    if (selectedBookmarkTag && !tags.includes(selectedBookmarkTag)) return false;
    if (!q) return true;
    const text = [item.title, item.description, item.url, item.note, item.tags].map(v => String(v || '').toLowerCase()).join(' ');
    return text.includes(q);
  });

  if (!filteredBookmarks.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔖</div>暂无符合条件的收藏</div>';
    if (document.getElementById('page-bookmarks').style.display !== 'none') updateHeaderStats('bookmarks');
    return;
  }

  list.innerHTML = filteredBookmarks.map(item => {
    const title = escHtml(item.title || item.url || '未命名收藏');
    const desc = escHtml(item.description || '暂无描述');
    const note = escHtml(item.note || '');
    const url = escHtml(item.url || '#');
    const tags = normalizeBookmarkTags(item.tags);
    const id = Number(item.id) || 0;

    return `
      <div class="bookmark-card">
        <a class="bookmark-link" href="${url}" target="_blank" rel="noopener">${title}</a>
        <div class="bookmark-desc">${desc}</div>
        <div class="bookmark-tags">
          ${tags.length ? tags.map(tag => `<span class="bookmark-badge" style="${bookmarkTagStyle(tag)}">${escHtml(tag)}</span>`).join('') : '<span class="bookmark-badge" style="color:var(--text3);background:var(--bg3);border-color:var(--border);">未分类</span>'}
        </div>
        ${note ? `<div class="bookmark-note">备注：${note}</div>` : ''}
        <div class="bookmark-actions">
          <button class="btn-note" onclick="deleteBookmark(${id})">删除</button>
        </div>
      </div>`;
  }).join('');

  if (document.getElementById('page-bookmarks').style.display !== 'none') updateHeaderStats('bookmarks');
}

function normalizeImageList(list) {
  if (!Array.isArray(list)) return [];
  return list
    .map(item => {
      const name = String(item && item.name ? item.name : '').trim();
      const url = String(item && item.url ? item.url : '').trim();
      if (!url) return null;
      return { name: name || url.split('/').pop() || '未命名图片', url };
    })
    .filter(Boolean);
}

function normalizeRankingDate(value) {
  const text = String(value || '').trim();
  if (!text) return '';
  const datePart = text.slice(0, 10).replace(/\//g, '-').replace(/\./g, '-');
  if (/^\d{4}-\d{2}-\d{2}$/.test(datePart)) return datePart;
  return '';
}

function normalizeRankingList(list) {
  if (!Array.isArray(list)) return [];
  return list
    .map(item => {
      const rankNum = Number(item.rank_num ?? item.rank ?? 0);
      const favStart = Number(item.fav_start ?? item.fav_count ?? 0);
      const favGrowth = Number(item.fav_growth ?? 0);
      const favEnd = Number(item.fav_end ?? 0);
      const novelIdRaw = item.novel_id ?? item.novelId ?? item.novelID ?? item.work_id ?? item.workId ?? item.novelid ?? '';
      const title = String(item.title || '').trim();
      const author = String(item.author || '').trim();
      const bookUrl = String(item.book_url || '').trim();
      if (!title || !Number.isFinite(rankNum)) return null;
      return {
        rank_num: Math.max(1, Math.round(rankNum)),
        title,
        author: author || '未知作者',
        novel_id: String(novelIdRaw || '').trim(),
        book_url: bookUrl,
        fav_start: Number.isFinite(favStart) ? Math.max(0, Math.round(favStart)) : 0,
        fav_growth: Number.isFinite(favGrowth) ? Math.round(favGrowth) : 0,
        fav_end: Number.isFinite(favEnd) ? Math.max(0, Math.round(favEnd)) : 0,
      };
    })
    .sort((a, b) => a.rank_num - b.rank_num)
    .filter(Boolean);
}

async function initRankings() {
  try {
    const res = await fetch('/api/rankings/dates');
    const payload = await res.json();
    rankingDates = (Array.isArray(payload) ? payload : [])
      .map(item => normalizeRankingDate(item))
      .filter(Boolean)
      .sort((a, b) => a.localeCompare(b));

    selectedRankingDate = rankingDates.length ? rankingDates[rankingDates.length - 1] : '';
    buildRankingDateSelector();
    await fetchRankingsByDate();
  } catch (e) {
    rankingDates = [];
    selectedRankingDate = '';
    allRankings = [];
    buildRankingDateSelector();
  }
}

function buildRankingDateSelector() {
  const select = document.getElementById('rankingDate');
  if (!select) return;

  if (!rankingDates.length) {
    select.innerHTML = '<option value="">暂无数据</option>';
    select.disabled = true;
    return;
  }

  select.disabled = false;
  select.innerHTML = rankingDates
    .slice()
    .reverse()
    .map(date => `<option value="${date}" ${date === selectedRankingDate ? 'selected' : ''}>${date}</option>`)
    .join('');
}

async function onRankingDateChange() {
  const select = document.getElementById('rankingDate');
  const date = select ? String(select.value || '').trim() : '';
  if (!rankingDates.includes(date)) {
    if (select) select.value = selectedRankingDate;
    return;
  }
  selectedRankingDate = date;
  await fetchRankingsByDate();
  renderRankings();
}

async function fetchRankingsByDate() {
  if (!selectedRankingDate) {
    allRankings = [];
    return;
  }

  try {
    const params = new URLSearchParams();
    params.set('date', selectedRankingDate);
    const res = await fetch(`/api/rankings?${params.toString()}`);
    const payload = await res.json();
    allRankings = normalizeRankingList(payload);
  } catch (e) {
    allRankings = [];
  }
}

function formatFavDelta(delta) {
  if (delta === null || delta === undefined || delta === 0) {
    return '<span class="rank-delta same">-</span>';
  }
  if (delta > 0) {
    return `<span class="rank-delta up">↑${fmtNum(delta)}</span>`;
  }
  return `<span class="rank-delta down">↓${fmtNum(Math.abs(delta))}</span>`;
}

function rankingFavGrowthHtml(item) {
  if (!item) return '<span class="rank-delta same">-</span>';
  if (Number(item.fav_end || 0) === 0) {
    return '<span class="rank-delta same">待更新</span>';
  }

function rankingTitleLink(item) {
  if (!item || !item.title) return '-';
  const title = String(item.title || '').trim();
  const bookUrl = String(item.book_url || '').trim();
  const novelId = String(item.novel_id || '').trim();
  const href = bookUrl
    ? bookUrl
    : novelId
      ? `https://www.jjwxc.net/onebook.php?novelid=${encodeURIComponent(novelId)}`
      : `https://s.jjwxc.net/search.php?kw=${encodeURIComponent(title)}`;
  return `<a class="rank-title-link" href="${href}" target="_blank" rel="noopener">${escHtml(title)}</a>`;
}

function extractNovelIdFromJjLink(url) {
  const raw = String(url || '').trim();
  if (!raw) return '';
  const qMatch = raw.match(/[?&]novelid=(\d+)/i);
  if (qMatch && qMatch[1]) return qMatch[1];
  const pathMatch = raw.match(/\/onebook\.php\?novelid=(\d+)/i);
  if (pathMatch && pathMatch[1]) return pathMatch[1];
  return '';
}

function resolveRankingNovelId(item) {
  const direct = String(item && item.novel_id ? item.novel_id : '').trim();
  if (direct) return direct;

  const title = String(item && item.title ? item.title : '').trim();
  if (!title || !Array.isArray(allBooks)) return '';

  const matchedBook = allBooks.find(book => String(book['书名'] || '').trim() === title);
  if (!matchedBook) return '';

  return extractNovelIdFromJjLink(matchedBook['晋江链接']);
}

function normalizeWeeklyPeriodValue(value) {
  const text = String(value || '').trim();
  if (!text) return '';

  const matched = text.match(/\d{4}[-\/.]\d{1,2}[-\/.]\d{1,2}/);
  const raw = matched ? matched[0] : text;
  const normalized = raw.replace(/[\/.]/g, '-');
  const parts = normalized.split('-');

  if (parts.length === 3 && parts.every(part => /^\d+$/.test(part))) {
    const [year, month, day] = parts;
    return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
  }

  return normalized;
}

function normalizeWeeklyPeriods(payload) {
  if (!Array.isArray(payload)) return [];

  const seen = new Set();
  const result = [];

  payload.forEach(item => {
    const raw = typeof item === 'string'
      ? item
      : (item && typeof item === 'object' ? (item.period || item.rank_date || '') : '');
    const period = normalizeWeeklyPeriodValue(raw);
    if (!period || seen.has(period)) return;
    seen.add(period);
    result.push(period);
  });

  // Ensure the default period is the newest available one.
  result.sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));

  return result;
}

function normalizeWeeklyRows(list) {
  if (!Array.isArray(list)) return [];
  return list.map(item => {
    const title = String(item.title || item.book_name || '').trim();
    const level1 = String(item.level1 || '未分组').trim();
    const level2 = String(item.level2 || '其他').trim();
    const novelIdRaw = item.work_id || item.novel_id || item.novelid || item.id || '';
    const novelId = String(novelIdRaw || '').trim();
    const channel = String(item.channel || selectedWeeklyChannel || '未知').trim();
    return {
      title: title || '未命名作品',
      level1: level1 || '未分组',
      level2: level2 || '其他',
      novelId,
      channel: channel || '未知',
    };
  });
}

    selectedWeeklyPeriod = '';

    buildWeeklyPeriodSelector();
    renderWeeklyRankings();

}

function initImageBedEvents() {
  if (imageBedReady) return;
  const zone = document.getElementById('imageUploadZone');
  if (!zone) return;

  ['dragenter', 'dragover'].forEach(type => {
    zone.addEventListener(type, e => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.add('dragover');
    });
  });

  ['dragleave', 'drop'].forEach(type => {
    zone.addEventListener(type, e => {
      e.preventDefault();
      e.stopPropagation();
      if (type === 'drop') {
        handleUploadFiles(e.dataTransfer ? e.dataTransfer.files : []);
      }
      zone.classList.remove('dragover');
    });
  });

  imageBedReady = true;
}

function setImageUploadTip(text, type) {

  tip.textContent = text || '';
  tip.classList.remove('ok', 'err');
  if (type === 'ok') tip.classList.add('ok');

async function handleUploadFiles(fileList) {
  const files = Array.from(fileList || []).filter(file => file && String(file.type || '').startsWith('image/'));
  if (!files.length) {
    setImageUploadTip('请选择图片文件后再上传', 'err');
    return;
  }

  setImageUploadTip(`正在上传 ${files.length} 张图片...`, '');

  const results = await Promise.allSettled(files.map(uploadSingleImage));
  let success = 0;
  let failed = 0;

  results.forEach(result => {
    if (result.status === 'fulfilled' && result.value && result.value.url) {
      success += 1;
      const item = result.value;
      if (item.name) hiddenImageNames.delete(item.name);
      const existedIndex = allImages.findIndex(img => img.url === item.url);
      if (existedIndex >= 0) allImages.splice(existedIndex, 1);
      allImages.unshift(item);
    } else {
      failed += 1;
    }
  });

  saveHiddenImageNames();
  renderImageBed();

  if (failed === 0) {
    setImageUploadTip(`上传成功 ${success} 张`, 'ok');
  } else {
    setImageUploadTip(`上传完成：成功 ${success} 张，失败 ${failed} 张`, failed === files.length ? 'err' : '');
  }
}

async function uploadSingleImage(file) {
  const formData = new FormData();
  formData.append('file', file, file.name || 'image');

  const res = await fetch('/api/upload', {
    method: 'POST',
    body: formData,
  });

  const payload = await res.json().catch(() => ({}));
  if (!res.ok || !payload || !payload.ok || !payload.url) {
    throw new Error(payload && payload.error ? payload.error : 'upload failed');
  }

  return {
    name: String(file.name || payload.url.split('/').pop() || '未命名图片'),
    url: String(payload.url),
  };
}

    });

  if (!filteredImages.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🖼️</div>暂无图片，先上传一张吧</div>';
    if (document.getElementById('page-images').style.display !== 'none') updateHeaderStats('images');
    return;
  }

  list.innerHTML = filteredImages.map(item => {
    const safeName = escHtml(item.name || '未命名图片');
    const safeUrl = escHtml(item.url || '');
    return `
      <div class="image-card">
        <div class="image-thumb-wrap">

        </div>
        <div class="image-card-body">
          <div class="image-name" title="${safeName}">${safeName}</div>
          <div class="image-url-row">
            <input class="image-url-input" readonly value="${safeUrl}" onclick="copyImageUrl(${item.__idx}, this)" />
            <span class="image-copy-tip">点击输入框复制链接</span>
          </div>
          <div class="image-actions">
            <button class="btn-note" onclick="removeImage(${item.__idx})">删除</button>
          </div>
        </div>
      </div>`;
  }).join('');

  if (document.getElementById('page-images').style.display !== 'none') updateHeaderStats('images');
}

function showImageCopyTip(inputEl, text, ok) {
  const row = inputEl ? inputEl.closest('.image-url-row') : null;
  const tip = row ? row.querySelector('.image-copy-tip') : null;
  if (!tip) return;
  tip.textContent = text;
  tip.classList.toggle('ok', !!ok);
}

function copyImageUrl(index, inputEl) {
  const item = allImages[index];
  if (!item || !item.url) return;
  if (inputEl && typeof inputEl.select === 'function') inputEl.select();
  navigator.clipboard.writeText(item.url).then(() => {
    showImageCopyTip(inputEl, '已复制✓', true);
    setTimeout(() => showImageCopyTip(inputEl, '点击输入框复制链接', false), 1200);
  }).catch(() => {
    showImageCopyTip(inputEl, '复制失败，请手动复制', false);
  });
}

async function removeImage(index) {
  const item = allImages[index];
  if (!item) return;
  if (!window.confirm('确定删除这张图片吗？')) return;

  let removedByApi = false;
  const imageName = String(item.name || '').trim();
  const candidates = imageName
    ? [
        `/api/images/${encodeURIComponent(imageName)}`,
        `/api/images?name=${encodeURIComponent(imageName)}`,
      ]
    : [];

  for (const url of candidates) {
    try {
      const res = await fetch(url, { method: 'DELETE' });
      if (res.ok) {
        removedByApi = true;
        break;
      }
    } catch (e) {
      // 忽略并尝试下一个候选接口
    }
  }

  if (item.name) {
    hiddenImageNames.add(item.name);
    saveHiddenImageNames();
  }
  renderImageBed();

  if (removedByApi) {
    setImageUploadTip('删除成功', 'ok');
  } else {
    setImageUploadTip('已从列表移除（若需彻底删除请确认后端删除接口路径）', '');
  }
}

document.getElementById('mediaNoteModal').addEventListener('click', e => {
  if (e.target === document.getElementById('mediaNoteModal')) closeMediaNoteModal();
});

document.getElementById('bookmarkModal').addEventListener('click', e => {
  if (e.target === document.getElementById('bookmarkModal')) closeBookmarkModal();
});

// ── Author data ──
let authorHistory = [];

async function initAuthor() {
  try {
    const res = await fetch('/api/author_data');
    authorHistory = await res.json();
    // 保持原始顺序：最后一条 = 最新，倒数第二条 = 上次
    renderAuthorPage();
  } catch(e) {
    document.getElementById('authorContent').innerHTML =
      '<div class="author-empty"><div class="author-empty-icon">⚠️</div>author_data.json 加载失败</div>';
  }
}

function numStr(val) {
  const n = parseInt(String(val || '0').replace(/,/g, '').replace(/万/g, ''));
  return isNaN(n) ? 0 : n;
}
function fmtNum(n) { return n.toLocaleString('zh-CN'); }
function fmtFav(n) { return n >= 10000 ? (n / 10000).toFixed(1) + '万' : fmtNum(n); }

// 生成数值差异标签，无变化时返回空字符串
function diffBadge(cur, prevVal) {
  if (prevVal === undefined || prevVal === null) return '';
  const diff = numStr(cur) - numStr(prevVal);
  if (diff > 0) return `<span class="fav-diff up">↑${fmtNum(diff)}</span>`;
  if (diff < 0) return `<span class="fav-diff down">↓${fmtNum(-diff)}</span>`;
  return '';
}

function destroyAuthorCharts() {
  authorCharts.forEach(chart => chart.destroy());
  authorCharts = [];
}

function buildTrendSeries(bookName) {
  return authorHistory
    .map(record => {
      const works = Array.isArray(record['作品列表']) ? record['作品列表'] : [];
      const match = works.find(item => item['书名'] === bookName);
      return match ? numStr(match['收藏数']) : null;
    })
    .filter(value => value !== null);
}

function renderTrendCharts() {
  destroyAuthorCharts();
  document.querySelectorAll('[data-trend-book]').forEach(node => {
    const bookName = node.dataset.trendBook;
    const series = buildTrendSeries(bookName);
    if (series.length <= 1) {
      node.innerHTML = '<span class="trend-empty">暂无趋势数据</span>';
      return;
    }

    node.innerHTML = `<canvas class="trend-canvas" width="200" height="60"></canvas>`;
    const canvas = node.querySelector('canvas');
    const chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: series.map((_, index) => index + 1),
        datasets: [{
          data: series,
          borderColor: '#6366F1',
          backgroundColor: 'rgba(99,102,241,0.08)',
          borderWidth: 2,
          tension: 0.35,
          pointRadius: 0,
          fill: true,
        }],
      },
      options: {
        responsive: false,
        animation: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false, grid: { display: false } },
          y: { display: false, grid: { display: false } },
        },
        elements: { line: { capBezierPoints: true } },
      },
    });
    authorCharts.push(chart);
  });
}

function renderAuthorPage() {
  const el = document.getElementById('authorContent');
  if (!authorHistory.length) {
    el.innerHTML = '<div class="author-empty"><div class="author-empty-icon">📭</div>暂无数据，请先运行爬虫生成 author_data.json</div>';
    return;
  }

  // 最后一条 = 最新，倒数第二条 = 上次
  const latest = authorHistory[authorHistory.length - 1];
  const prev   = authorHistory.length > 1 ? authorHistory[authorHistory.length - 2] : null;

  // 构建上次书籍 map
  const prevMap = {};
  if (prev && Array.isArray(prev['作品列表'])) {
    prev['作品列表'].forEach(b => { prevMap[b['书名']] = b; });
  }

  const works     = latest['作品列表'] || [];
  const authorFav = numStr(latest['作者被收藏']);

  // 作者被收藏变化
  const authorFavDiff = prev ? diffBadge(latest['作者被收藏'], prev['作者被收藏']) : '';

  // ── Summary cards ──
  const summaryHtml = `
    <div class="summary-card">
      <div class="summary-label">最新抓取时间</div>
      <div class="summary-value sm">${latest['抓取时间'] || '未知'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">作者被收藏</div>
      <div class="summary-value ac" style="display:flex;align-items:center;gap:8px">
        ♥ ${fmtFav(authorFav)} ${authorFavDiff}
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-label">作品数量</div>
      <div class="summary-value">${works.length}</div>
    </div>
    ${authorHistory.length > 1 ? `
    <div class="summary-card">
      <div class="summary-label">对比基准</div>
      <div class="summary-value sm" style="color:var(--text2)">${prev['抓取时间'] || '上次'}</div>
    </div>` : ''}`;

  // ── Table rows ──
  const rowsHtml = works.map(book => {
    const name     = book['书名']  || '';
    const progress = book['进度']  || '';
    const words    = book['字数']  || '';
    const score    = book['积分']  || '';
    const fav      = numStr(book['收藏数']);
    const link     = book['链接']  || '';

    const pb = prevMap[name] || null;
    const favDiff   = pb ? diffBadge(book['收藏数'],  pb['收藏数'])  : '';
    const scoreDiff = pb ? diffBadge(book['积分'],    pb['积分'])    : '';
    const wordDiff  = pb ? diffBadge(book['字数'],    pb['字数'])    : '';

    const nameCell = link
      ? `<a href="${link}" target="_blank" rel="noopener">${name}</a>`
      : name;

    return `<tr>
      <td class="at-name">${nameCell}</td>
      <td><div class="at-fav">♥ ${fmtFav(fav)} ${favDiff}</div></td>
      <td class="at-score"><span class="value-with-diff">${score} ${scoreDiff}</span></td>
      <td style="color:var(--text2)"><span class="value-with-diff">${words} ${wordDiff}</span></td>
      <td class="at-progress">${progress}</td>
      <td class="trend-cell"><div class="trend-wrap" data-trend-book="${name.replace(/"/g, '&quot;')}"></div></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="author-summary">${summaryHtml}</div>
    <div class="author-table-wrap">
      <table class="author-table">
        <thead><tr>
          <th>书名</th>
          <th>收藏数</th>
          <th>积分</th>
          <th>字数</th>
          <th>进度</th>
          <th>趋势</th>
        </tr></thead>
        <tbody>${rowsHtml || '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">暂无作品数据</td></tr>'}</tbody>
      </table>
    </div>`;

  renderTrendCharts();
}

window.addEventListener('scroll', onWindowScroll, { passive: true });

init();
</script>
</body>
