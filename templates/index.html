<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>晋江版权维权系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f13;
  --bg2: #17171d;
  --bg3: #1e1e26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6f0;
  --text2: #9993b0;
  --text3: #5c5875;
  --accent: #c084fc;
  --accent2: #a855f7;
  --red: #f87171;
  --green: #4ade80;
  --amber: #fbbf24;
  --blue: #60a5fa;
  --radius: 12px;
  --radius-sm: 8px;
}

html { font-size: 15px; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,19,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.header-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.header-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #c084fc, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  flex: 1;
}
.stats-pill {
  font-size: 11px; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap;
}

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: border-color .2s;
}
.search-wrap input:focus { outline: none; border-color: var(--accent2); }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 15px; pointer-events: none;
}

/* ── Filter row ── */
.filter-row {
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
  padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-btn {
  flex-shrink: 0; padding: 6px 12px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active {
  background: var(--accent2); border-color: var(--accent2);
  color: #fff;
}
.filter-btn.has-value {
  border-color: var(--accent2); color: var(--accent);
}

/* ── Filter panel ── */
.filter-panel {
  display: none;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.filter-panel.open { display: block; }
.filter-section { margin-bottom: 14px; }
.filter-section:last-child { margin-bottom: 0; }
.filter-label {
  font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 8px;
}
.tag-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.tag-chip {
  padding: 5px 11px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.tag-chip:hover { border-color: var(--border2); color: var(--text); }
.tag-chip.active {
  background: rgba(168,85,247,.15);
  border-color: var(--accent2); color: var(--accent);
}
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type=range] {
  flex: 1; accent-color: var(--accent2);
  height: 4px;
}
.range-val { font-size: 12px; color: var(--text2); min-width: 60px; }

/* ── List ── */
.list-wrap { padding: 12px 12px 80px; }

/* ── Card ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .2s;
}
.card:hover { border-color: var(--border2); }

.card-head {
  padding: 12px 14px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px;
}
.card-main { flex: 1; min-width: 0; }
.card-title-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px; flex-wrap: wrap;
}
.book-name {
  font-size: 15px; font-weight: 700;
  color: var(--text);
}
.book-author { font-size: 12px; color: var(--text2); }
.card-meta {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.meta-tag {
  font-size: 11px; padding: 2px 7px;
  border-radius: 4px; border: 1px solid var(--border);
  color: var(--text3);
}
.fav-count {
  font-size: 11px; color: var(--red);
  display: flex; align-items: center; gap: 3px;
}

.card-right {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 6px; flex-shrink: 0;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.pending { background: var(--amber); }
.status-dot.done { background: var(--green); }
.status-dot.none { background: var(--text3); }

.piracy-count {
  font-size: 11px; padding: 2px 8px;
  border-radius: 4px; font-weight: 500;
}
.piracy-count.has-piracy {
  background: rgba(248,113,113,.12);
  color: var(--red); border: 1px solid rgba(248,113,113,.25);
}
.piracy-count.no-piracy {
  background: var(--bg3);
  color: var(--text3); border: 1px solid var(--border);
}

.chevron {
  font-size: 12px; color: var(--text3);
  transition: transform .2s; margin-top: 2px;
}
.chevron.open { transform: rotate(90deg); }

/* ── Card body ── */
.card-body { display: none; border-top: 1px solid var(--border); }
.card-body.open { display: block; }

.link-list { padding: 10px 14px; }
.link-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.link-item:last-child { border-bottom: none; }
.link-num {
  font-size: 11px; color: var(--text3);
  min-width: 18px;
}
.link-url {
  flex: 1; min-width: 0;
  font-size: 12px; color: var(--blue);
  text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.link-url:hover { text-decoration: underline; }
.btn-copy {
  flex-shrink: 0; font-size: 11px;
  padding: 3px 8px; border-radius: 5px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.btn-copy:hover { border-color: var(--border2); color: var(--text); }
.btn-copy.copied { color: var(--green); border-color: var(--green); }

.no-links {
  padding: 14px; text-align: center;
  font-size: 13px; color: var(--text3);
}

.card-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.footer-label { font-size: 12px; color: var(--text3); }
.status-select {
  font-size: 12px; padding: 4px 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: inherit;
  cursor: pointer;
}
.status-select:focus { outline: none; border-color: var(--accent2); }
.jj-link {
  font-size: 12px; color: var(--text3);
  text-decoration: none; margin-left: auto;
}
.jj-link:hover { color: var(--accent); }

/* ── Empty ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── Load more ── */
.load-more-wrap { text-align: center; padding: 16px; }
.load-more-btn {
  padding: 10px 24px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.load-more-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── View / Sort controls ── */
.ctrl-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.ctrl-group { display: flex; gap: 4px; flex-wrap: wrap; }
.ctrl-btn {
  padding: 5px 10px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.ctrl-btn:hover { border-color: var(--border2); color: var(--text); }
.ctrl-btn.active {
  background: rgba(168,85,247,.15);
  border-color: var(--accent2); color: var(--accent);
}
.ctrl-sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }
.ctrl-label { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ── Grid layout ── */
.grid-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  padding: 12px;
}
.list-wrap.grid-mode { padding: 0 0 80px !important; }

/* ── Grid card ── */
.g-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  cursor: pointer; transition: border-color .2s, transform .15s, box-shadow .2s;
  display: flex; flex-direction: column; gap: 7px;
  position: relative; min-height: 130px;
}
.g-card:hover {
  border-color: var(--accent2); transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(168,85,247,.12);
}
.g-card-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  line-height: 1.4; padding-right: 14px;
}
.g-card-author { font-size: 11px; color: var(--text2); }
.g-card-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.g-card-tag {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; border: 1px solid var(--border); color: var(--text3);
}
.g-card-tag.type { border-color: rgba(96,165,250,.3); color: var(--blue); }
.g-card-tag.content { border-color: rgba(168,85,247,.25); color: var(--accent); }
.g-card-bottom {
  display: flex; align-items: center;
  justify-content: space-between; margin-top: auto; padding-top: 6px;
  border-top: 1px solid var(--border);
}
.g-card-fav { font-size: 11px; color: var(--red); }
.g-piracy {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; font-weight: 500;
}
.g-piracy.has { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
.g-piracy.none { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.g-status {
  position: absolute; top: 10px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%;
}
.g-status.pending { background: var(--amber); }
.g-status.done { background: var(--green); }
.g-status.none-s { background: var(--text3); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto;
}
.modal-head {
  padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg2); z-index: 1;
  display: flex; align-items: flex-start; gap: 10px;
}
.modal-head-main { flex: 1; min-width: 0; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.modal-author { font-size: 12px; color: var(--text2); }
.modal-close {
  background: none; border: none; color: var(--text3);
  font-size: 20px; cursor: pointer; padding: 0 4px;
  line-height: 1; flex-shrink: 0;
}
.modal-close:hover { color: var(--text); }
.modal-meta {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.modal-links { border-bottom: 1px solid var(--border); }
.modal-footer { padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ── PC layout ── */
@media (min-width: 768px) {
  .header { padding: 16px 24px 14px; }
  .header-top { margin-bottom: 14px; }
  .header-title { font-size: 18px; }
  .controls-row {
    display: flex; gap: 12px; align-items: center;
  }
  .search-wrap { flex: 1; margin-bottom: 0; }
  .filter-row { flex-wrap: wrap; overflow: visible; }
  .list-wrap { padding: 16px 24px 60px; max-width: 900px; margin: 0 auto; }
  .list-wrap.grid-mode { padding: 0 0 60px !important; max-width: none; margin: 0; }
  .grid-wrap { padding: 16px 24px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .ctrl-row { padding: 10px 24px; }
  .card-head { padding: 14px 18px; }
  .link-list { padding: 10px 18px; }
  .card-footer { padding: 10px 18px; }
  .book-name { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">晋江维权系统</div>
    <div class="stats-pill" id="stats">加载中...</div>
  </div>
  <div class="controls-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="搜索书名、作者..." oninput="onFilter()">
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn" id="btnStatus" onclick="togglePanel('status')">状态 ▾</button>
      <button class="filter-btn" id="btnType" onclick="togglePanel('type')">类型 ▾</button>
      <button class="filter-btn" id="btnTag" onclick="togglePanel('tag')">标签 ▾</button>
      <button class="filter-btn" id="btnFav" onclick="togglePanel('fav')">收藏数 ▾</button>
      <button class="filter-btn" id="btnPiracy" onclick="togglePanel('piracy')">盗版 ▾</button>
      <button class="filter-btn" onclick="clearAll()" style="color:var(--text3)">清除</button>
    </div>
  </div>
</div>

<!-- 筛选面板 -->
<div class="filter-panel" id="panel-status">
  <div class="filter-section">
    <div class="filter-label">投诉状态</div>
    <div class="tag-grid" id="statusChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-type">
  <div class="filter-section">
    <div class="filter-label">作品类型</div>
    <div class="tag-grid" id="typeChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-tag">
  <div class="filter-section">
    <div class="filter-label">标签（可多选）</div>
    <div class="tag-grid" id="tagChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-fav">
  <div class="filter-section">
    <div class="filter-label">最低收藏数</div>
    <div class="range-row">
      <input type="range" id="favRange" min="0" max="300" value="0" step="5" oninput="onFavRange()">
      <span class="range-val" id="favRangeVal">不限</span>
    </div>
  </div>
</div>
<div class="filter-panel" id="panel-piracy">
  <div class="filter-section">
    <div class="filter-label">盗版情况</div>
    <div class="tag-grid">
      <div class="tag-chip" data-piracy="has" onclick="togglePiracy(this)">有盗版链接</div>
      <div class="tag-chip" data-piracy="none" onclick="togglePiracy(this)">未发现盗版</div>
    </div>
  </div>
</div>

<!-- 视图/排序控制 -->
<div class="ctrl-row">
  <span class="ctrl-label">视图</span>
  <div class="ctrl-group">
    <button class="ctrl-btn view-btn active" id="view-grid" onclick="setView('grid')">⊞ 网格</button>
    <button class="ctrl-btn view-btn" id="view-list" onclick="setView('list')">☰ 列表</button>
  </div>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">排序</span>
  <div class="ctrl-group">
    <button class="ctrl-btn sort-btn active" id="sort-random" onclick="setSort('random')">随机</button>
    <button class="ctrl-btn sort-btn" id="sort-fav_desc" onclick="setSort('fav_desc')">收藏↓</button>
    <button class="ctrl-btn sort-btn" id="sort-fav_asc" onclick="setSort('fav_asc')">收藏↑</button>
    <button class="ctrl-btn sort-btn" id="sort-piracy" onclick="setSort('piracy')">盗版↓</button>
  </div>
</div>

<!-- 书籍详情弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-head" id="modalHead"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-links" id="modalLinks"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="list-wrap" id="listWrap">
  <div id="list"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="load-more-btn" onclick="loadMore()">加载更多</button>
  </div>
</div>

<script>
let allBooks = [];
let filtered = [];
let PAGE_SIZE = 30;
let currentPage = 1;
let viewMode = 'grid';    // 'grid' | 'list'
let sortMode = 'random';  // 'random' | 'fav_desc' | 'fav_asc' | 'piracy'

let activePanel = null;
let selStatus = '';
let selType = '';
let selTags = new Set();
let selPiracy = '';
let favMin = 0;

async function init() {
  try {
    const res = await fetch('/api/books');
    allBooks = await res.json();
    buildFilterOptions();
    applyFilter();
  } catch(e) {
    document.getElementById('list').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>数据加载失败</div>';
  }
}

function buildFilterOptions() {
  // 状态
  const statuses = ['待投诉','已投诉','未发现盗版'];
  document.getElementById('statusChips').innerHTML =
    statuses.map(s => `<div class="tag-chip" data-val="${s}" onclick="toggleChip(this,'status')">${s}</div>`).join('');

  // 类型
  const types = [...new Set(allBooks.map(b => b['类型']).filter(Boolean))].sort();
  document.getElementById('typeChips').innerHTML =
    types.map(t => `<div class="tag-chip" data-val="${t}" onclick="toggleChip(this,'type')">${t}</div>`).join('');

  // 标签
  const tagSet = new Set();
  allBooks.forEach(b => getBookTags(b).forEach(t => tagSet.add(t)));
  document.getElementById('tagChips').innerHTML =
    [...tagSet].sort().map(t =>
      `<div class="tag-chip" data-val="${t}" onclick="toggleTag(this)">${t}</div>`
    ).join('') || '<span style="color:var(--text3);font-size:12px">暂无标签数据</span>';

  // 收藏数最大值
  const maxFav = Math.max(...allBooks.map(b => parseFavNum(b['收藏数'])));
  const slider = document.getElementById('favRange');
  slider.max = Math.ceil(maxFav / 10000) * 10;
}

function parseFavNum(str) {
  if (!str || str === '未获取') return 0;
  return parseInt(str.replace(/,/g,'')) || 0;
}

function getBookTags(book) {
  if (Array.isArray(book['标签']) && book['标签'].length > 0) {
    return [...new Set(book['标签'].map(t => String(t).trim()).filter(Boolean))];
  }

  const raw = book['内容标签'];
  if (!raw || raw === '未获取') return [];

  return [...new Set(
    String(raw)
      .split(/[、，,|\/\s]+/)
      .map(t => t.trim())
      .filter(Boolean)
  )];
}

// ── View & Sort ──
function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + mode).classList.add('active');
  renderList();
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  applyFilter();
}

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function sortFiltered() {
  if (sortMode === 'random') {
    shuffleArr(filtered);
  } else if (sortMode === 'fav_desc') {
    filtered.sort((a, b) => parseFavNum(b['收藏数']) - parseFavNum(a['收藏数']));
  } else if (sortMode === 'fav_asc') {
    filtered.sort((a, b) => parseFavNum(a['收藏数']) - parseFavNum(b['收藏数']));
  } else if (sortMode === 'piracy') {
    filtered.sort((a, b) => (b['盗版链接']?.length || 0) - (a['盗版链接']?.length || 0));
  }
}

function togglePanel(name) {
  const panel = document.getElementById(`panel-${name}`);
  if (activePanel && activePanel !== name) {
    document.getElementById(`panel-${activePanel}`).classList.remove('open');
  }
  panel.classList.toggle('open');
  activePanel = panel.classList.contains('open') ? name : null;
}

function toggleChip(el, type) {
  const val = el.dataset.val;
  const container = el.parentElement;
  container.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  if (type === 'status') {
    selStatus = selStatus === val ? '' : val;
    if (selStatus) el.classList.add('active');
    document.getElementById('btnStatus').classList.toggle('has-value', !!selStatus);
  } else {
    selType = selType === val ? '' : val;
    if (selType) el.classList.add('active');
    document.getElementById('btnType').classList.toggle('has-value', !!selType);
  }
  applyFilter();
}

function toggleTag(el) {
  const val = el.dataset.val;
  if (selTags.has(val)) { selTags.delete(val); el.classList.remove('active'); }
  else { selTags.add(val); el.classList.add('active'); }
  document.getElementById('btnTag').classList.toggle('has-value', selTags.size > 0);
  applyFilter();
}

function togglePiracy(el) {
  const val = el.dataset.piracy;
  el.parentElement.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  selPiracy = selPiracy === val ? '' : val;
  if (selPiracy) el.classList.add('active');
  document.getElementById('btnPiracy').classList.toggle('has-value', !!selPiracy);
  applyFilter();
}

function onFavRange() {
  const v = parseInt(document.getElementById('favRange').value);
  favMin = v * 10000;
  document.getElementById('favRangeVal').textContent = v === 0 ? '不限' : `${v}万+`;
  document.getElementById('btnFav').classList.toggle('has-value', v > 0);
  applyFilter();
}

function clearAll() {
  selStatus = ''; selType = ''; selTags.clear(); selPiracy = ''; favMin = 0;
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('has-value'));
  document.getElementById('favRange').value = 0;
  document.getElementById('favRangeVal').textContent = '不限';
  document.getElementById('search').value = '';
  applyFilter();
}

function onFilter() { applyFilter(); }

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filtered = allBooks.filter(b => {
    if (q && !b['书名'].toLowerCase().includes(q) && !b['作者'].toLowerCase().includes(q)) return false;
    if (selStatus && b['投诉状态'] !== selStatus) return false;
    if (selType && b['类型'] !== selType) return false;
    if (selTags.size > 0) {
      const bTags = getBookTags(b);
      if (![...selTags].every(t => bTags.includes(t))) return false;
    }
    if (favMin > 0 && parseFavNum(b['收藏数']) < favMin) return false;
    if (selPiracy === 'has' && (!b['盗版链接'] || b['盗版链接'].length === 0)) return false;
    if (selPiracy === 'none' && b['盗版链接'] && b['盗版链接'].length > 0) return false;
    return true;
  });
  sortFiltered();
  currentPage = 1;
  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  const wrap = document.getElementById('listWrap');
  const total = filtered.length;
  const piracyTotal = filtered.filter(b => b['盗版链接'] && b['盗版链接'].length > 0).length;
  document.getElementById('stats').textContent = `${total} 本 · ${piracyTotal} 本有盗版`;

  if (total === 0) {
    list.className = '';
    wrap.classList.remove('grid-mode');
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>没有符合条件的书目</div>';
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }

  const pageData = filtered.slice(0, currentPage * PAGE_SIZE);
  if (viewMode === 'grid') {
    wrap.classList.add('grid-mode');
    list.className = 'grid-wrap';
    list.innerHTML = pageData.map((b, i) => renderGridCard(b, i)).join('');
  } else {
    wrap.classList.remove('grid-mode');
    list.className = '';
    list.innerHTML = pageData.map((b, i) => renderCard(b, i)).join('');
  }

  const hasMore = total > currentPage * PAGE_SIZE;
  document.getElementById('loadMoreWrap').style.display = hasMore ? 'block' : 'none';
}

function loadMore() {
  currentPage++;
  const list = document.getElementById('list');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, currentPage * PAGE_SIZE);
  if (viewMode === 'grid') {
    list.insertAdjacentHTML('beforeend', pageData.map((b, i) => renderGridCard(b, start + i)).join(''));
  } else {
    list.insertAdjacentHTML('beforeend', pageData.map((b, i) => renderCard(b, start + i)).join(''));
  }
  const hasMore = filtered.length > currentPage * PAGE_SIZE;
  document.getElementById('loadMoreWrap').style.display = hasMore ? 'block' : 'none';
}

// ── Grid Card ──
function renderGridCard(b, idx) {
  const links = b['盗版链接'] || [];
  const status = b['投诉状态'] || '待投诉';
  const dotClass = status === '已投诉' ? 'done' : status === '未发现盗版' ? 'none-s' : 'pending';
  const tags = getBookTags(b).slice(0, 3);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : (b['收藏数'] || '?');
  return `
  <div class="g-card" onclick="openModal(${idx})">
    <div class="g-status ${dotClass}" title="${status}"></div>
    <div class="g-card-title">${b['书名']}</div>
    <div class="g-card-author">${b['作者']}</div>
    <div class="g-card-tags">
      ${b['类型'] ? `<span class="g-card-tag type">${b['类型']}</span>` : ''}
      ${tags.map(t => `<span class="g-card-tag content">${t}</span>`).join('')}
    </div>
    <div class="g-card-bottom">
      <span class="g-card-fav">♥ ${favStr}</span>
      <span class="g-piracy ${links.length > 0 ? 'has' : 'none'}">
        ${links.length > 0 ? `${links.length}条盗版` : '未发现'}
      </span>
    </div>
  </div>`;
}

// ── Modal ──
function openModal(idx) {
  const b = filtered[idx];
  if (!b) return;
  const links = b['盗版链接'] || [];
  const status = b['投诉状态'] || '待投诉';
  const tags = getBookTags(b);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : (b['收藏数'] || '?');

  const linksHtml = links.length > 0
    ? links.map((url, j) => `
        <div class="link-item">
          <span class="link-num">${j+1}</span>
          <a class="link-url" href="${url}" target="_blank" rel="noopener">${url}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${url.replace(/'/g,"\\'")}')">复制</button>
        </div>`).join('')
    : '<div class="no-links">未发现盗版链接</div>';

  document.getElementById('modalHead').innerHTML = `
    <div class="modal-head-main">
      <div class="modal-title">${b['书名']}</div>
      <div class="modal-author">${b['作者']}</div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>`;

  document.getElementById('modalMeta').innerHTML = `
    ${b['类型'] ? `<span class="meta-tag" style="color:var(--blue);border-color:rgba(96,165,250,.3)">${b['类型']}</span>` : ''}
    ${b['文章类型'] && b['文章类型'] !== '未获取' ? `<span class="meta-tag" style="color:var(--text2)">${b['文章类型']}</span>` : ''}
    ${tags.map(t => `<span class="meta-tag" style="color:var(--accent);border-color:rgba(168,85,247,.25)">${t}</span>`).join('')}
    <span class="fav-count">♥ ${favStr}</span>`;

  document.getElementById('modalLinks').innerHTML = `<div class="link-list">${linksHtml}</div>`;

  document.getElementById('modalFooter').innerHTML = `
    <span class="footer-label">投诉状态</span>
    <select class="status-select" onchange="updateStatus('${b['书名'].replace(/'/g,"\\'")}', this.value)">
      <option ${status==='待投诉'?'selected':''}>待投诉</option>
      <option ${status==='已投诉'?'selected':''}>已投诉</option>
      <option ${status==='未发现盗版'?'selected':''}>未发现盗版</option>
    </select>
    <a href="${b['晋江链接']}" target="_blank" class="jj-link">晋江原文 →</a>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── List Card (original) ──
function renderCard(b, idx) {
  const links = b['盗版链接'] || [];
  const status = b['投诉状态'] || '待投诉';
  const dotClass = status === '已投诉' ? 'done' : status === '未发现盗版' ? 'none' : 'pending';
  const tags = getBookTags(b).slice(0, 4);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : b['收藏数'];

  const linksHtml = links.length > 0
    ? links.map((url, j) => `
        <div class="link-item">
          <span class="link-num">${j+1}</span>
          <a class="link-url" href="${url}" target="_blank" rel="noopener">${url}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${url.replace(/'/g,"\\'")}')">复制</button>
        </div>`).join('')
    : '<div class="no-links">未发现盗版链接</div>';

  return `
  <div class="card" id="card-${idx}">
    <div class="card-head" onclick="toggleCard(${idx})">
      <div class="card-main">
        <div class="card-title-row">
          <span class="book-name">${b['书名']}</span>
          <span class="book-author">${b['作者']}</span>
        </div>
        <div class="card-meta">
          ${b['类型'] ? `<span class="meta-tag">${b['类型']}</span>` : ''}
          ${tags.map(t => `<span class="meta-tag" style="color:var(--accent);border-color:rgba(168,85,247,.25)">${t}</span>`).join('')}
          <span class="fav-count">♥ ${favStr}</span>
        </div>
      </div>
      <div class="card-right">
        <div class="status-dot ${dotClass}" title="${status}"></div>
        <span class="piracy-count ${links.length > 0 ? 'has-piracy' : 'no-piracy'}">
          ${links.length > 0 ? `${links.length}条盗版` : '未发现'}
        </span>
        <span class="chevron" id="chev-${idx}">▶</span>
      </div>
    </div>
    <div class="card-body" id="body-${idx}">
      <div class="link-list">${linksHtml}</div>
      <div class="card-footer">
        <span class="footer-label">投诉状态</span>
        <select class="status-select" onchange="updateStatus('${b['书名'].replace(/'/g,"\\'")}', this.value)">
          <option ${status==='待投诉'?'selected':''}>待投诉</option>
          <option ${status==='已投诉'?'selected':''}>已投诉</option>
          <option ${status==='未发现盗版'?'selected':''}>未发现盗版</option>
        </select>
        <a href="${b['晋江链接']}" target="_blank" class="jj-link">晋江原文 →</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(idx) {
  document.getElementById(`body-${idx}`).classList.toggle('open');
  document.getElementById(`chev-${idx}`).classList.toggle('open');
}

function copyUrl(btn, url) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
  });
}

async function updateStatus(bookName, newStatus) {
  const book = allBooks.find(b => b['书名'] === bookName);
  if (book) book['投诉状态'] = newStatus;
  await fetch('/api/update_status', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({'书名': bookName, '投诉状态': newStatus})
  });
}

// 点击面板外关闭
document.addEventListener('click', e => {
  if (!e.target.closest('.filter-panel') && !e.target.closest('.filter-btn')) {
    document.querySelectorAll('.filter-panel').forEach(p => p.classList.remove('open'));
    activePanel = null;
  }
});

// Modal: close on overlay backdrop click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Modal: close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
