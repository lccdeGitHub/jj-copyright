<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>晋江版权维权系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8F9FA;
  --bg2: #FFFFFF;
  --bg3: #F3F4F6;
  --border: #E5E7EB;
  --border2: #D1D5DB;
  --text: #1F2937;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --accent: #6366F1;
  --accent2: #6366F1;
  --red: #EF4444;
  --green: #10B981;
  --amber: #F59E0B;
  --blue: #4F46E5;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
}

html { font-size: 15px; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(248,249,250,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.header-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.header-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #4F46E5, #6366F1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  flex: 1;
}
.stats-pill {
  font-size: 11px; color: var(--text2);
  background: var(--bg2); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
}

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: border-color .2s;
}
.search-wrap input:focus { outline: none; border-color: var(--accent2); }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 15px; pointer-events: none;
}

/* ── Filter row ── */
.filter-row {
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
  padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-btn {
  flex-shrink: 0; padding: 6px 12px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active {
  background: var(--accent2); border-color: var(--accent2);
  color: #fff;
}
.filter-btn.has-value {
  border-color: var(--accent2); color: var(--accent);
}

/* ── Filter panel ── */
.filter-panel {
  display: none;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.filter-panel.open { display: block; }
.filter-section { margin-bottom: 14px; }
.filter-section:last-child { margin-bottom: 0; }
.filter-label {
  font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 8px;
}
.tag-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.tag-chip {
  padding: 5px 11px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.tag-chip:hover { border-color: var(--border2); color: var(--text); }
.tag-chip.active {
  background: rgba(168,85,247,.15);
  border-color: var(--accent2); color: var(--accent);
}
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type=range] {
  flex: 1; accent-color: var(--accent2);
  height: 4px;
}
.range-val { font-size: 12px; color: var(--text2); min-width: 60px; }

/* ── List ── */
.list-wrap { padding: 12px 12px 80px; }

/* ── Card ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  box-shadow: var(--shadow-sm);
}
.card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }

.card-head {
  padding: 12px 14px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px;
}
.card-main { flex: 1; min-width: 0; }
.card-title-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px; flex-wrap: wrap;
}
.book-name {
  font-size: 15px; font-weight: 700;
  color: var(--text);
}
.book-author { font-size: 12px; color: var(--text2); }
.card-meta {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.meta-tag {
  font-size: 11px; padding: 2px 7px;
  border-radius: 4px; border: 1px solid var(--border);
  color: var(--text3);
}
.fav-count {
  font-size: 11px; color: var(--red);
  display: flex; align-items: center; gap: 3px;
}

.card-right {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 6px; flex-shrink: 0;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.pending { background: var(--amber); }
.status-dot.done { background: var(--green); }
.status-dot.none { background: var(--text3); }

.piracy-count {
  font-size: 11px; padding: 2px 8px;
  border-radius: 4px; font-weight: 500;
}
.piracy-count.has-piracy {
  background: rgba(248,113,113,.12);
  color: var(--red); border: 1px solid rgba(248,113,113,.25);
}
.piracy-count.no-piracy {
  background: var(--bg3);
  color: var(--text3); border: 1px solid var(--border);
}

.chevron {
  font-size: 12px; color: var(--text3);
  transition: transform .2s; margin-top: 2px;
}
.chevron.open { transform: rotate(90deg); }

/* ── Card body ── */
.card-body { display: none; border-top: 1px solid var(--border); }
.card-body.open { display: block; }

.link-list { padding: 10px 14px; }
.link-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.link-item:last-child { border-bottom: none; }
.link-num {
  font-size: 11px; color: var(--text3);
  min-width: 18px;
}
.link-url {
  flex: 1; min-width: 0;
  font-size: 12px; color: var(--blue);
  text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.link-url:hover { text-decoration: underline; }
.btn-copy {
  flex-shrink: 0; font-size: 11px;
  padding: 3px 8px; border-radius: 5px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.btn-copy:hover { border-color: var(--border2); color: var(--text); }
.btn-copy.copied { color: var(--green); border-color: var(--green); }

.no-links {
  padding: 14px; text-align: center;
  font-size: 13px; color: var(--text3);
}

.card-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.footer-label { font-size: 12px; color: var(--text3); }
.status-select {
  font-size: 12px; padding: 4px 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: inherit;
  cursor: pointer;
}
.status-select:focus { outline: none; border-color: var(--accent2); }
.jj-link {
  font-size: 12px; color: var(--text3);
  text-decoration: none; margin-left: auto;
}
.jj-link:hover { color: var(--accent); }

/* ── Empty ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── Load more ── */
.load-more-wrap { text-align: center; padding: 16px; }
.loading-indicator {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 13px; box-shadow: var(--shadow-sm);
}
.spinner {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid #C7D2FE; border-top-color: var(--accent2);
  animation: spin 0.9s linear infinite;
}
.load-complete {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 14px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 13px; box-shadow: var(--shadow-sm);
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-more-btn {
  padding: 10px 24px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.load-more-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── View / Sort controls ── */
.ctrl-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.ctrl-group { display: flex; gap: 4px; flex-wrap: wrap; }
.ctrl-btn {
  padding: 5px 10px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.ctrl-btn:hover { border-color: var(--border2); color: var(--text); }
.ctrl-btn.active {
  background: rgba(168,85,247,.15);
  border-color: var(--accent2); color: var(--accent);
}
.ctrl-sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }
.ctrl-label { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ── Grid layout ── */
.grid-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  padding: 12px;
}
.list-wrap.grid-mode { padding: 0 0 80px !important; }

/* ── Grid card ── */
.g-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  cursor: pointer; transition: border-color .2s, transform .15s, box-shadow .2s;
  display: flex; flex-direction: column; gap: 7px;
  position: relative; min-height: 130px;
  box-shadow: var(--shadow-sm);
}
.g-card:hover {
  border-color: var(--accent2); transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.g-card-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  line-height: 1.4; padding-right: 14px;
}
.g-card-author { font-size: 11px; color: var(--text2); }
.g-card-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.g-card-tag {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; border: 1px solid var(--border); color: var(--text3);
}
.g-card-tag.type { border-color: rgba(96,165,250,.3); color: var(--blue); }
.g-card-tag.content { border-color: rgba(99,102,241,.22); color: var(--accent); }
.g-card-bottom {
  display: flex; align-items: center;
  justify-content: space-between; margin-top: auto; padding-top: 6px;
  border-top: 1px solid var(--border);
}
.g-card-fav { font-size: 11px; color: var(--red); }
.g-piracy {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; font-weight: 500;
}
.g-piracy.has { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
.g-piracy.none { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.g-status {
  position: absolute; top: 10px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%;
}
.g-status.pending { background: var(--amber); }
.g-status.done { background: var(--green); }
.g-status.none-s { background: var(--text3); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(31,41,55,.18); backdrop-filter: blur(8px);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 24px 48px rgba(15, 23, 42, 0.16);
}
.modal-head {
  padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg2); z-index: 1;
  display: flex; align-items: flex-start; gap: 10px;
}
.modal-head-main { flex: 1; min-width: 0; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.modal-author { font-size: 12px; color: var(--text2); }
.modal-close {
  background: none; border: none; color: var(--text3);
  font-size: 20px; cursor: pointer; padding: 0 4px;
  line-height: 1; flex-shrink: 0;
}
.modal-close:hover { color: var(--text); }
.modal-meta {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.modal-links { border-bottom: 1px solid var(--border); }
.modal-footer { padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.notes-section {
  width: 100%;
  border-top: 1px solid var(--border);
  margin-top: 10px;
  padding-top: 12px;
}
.notes-title {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 600;
}
.notes-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.notes-label {
  font-size: 12px;
  color: var(--text3);
  min-width: 64px;
}
.star-rating {
  display: inline-flex;
  gap: 4px;
}
.star-btn {
  border: none;
  background: transparent;
  color: #D1D5DB;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
}
.star-btn.active { color: #F59E0B; }
.notes-textarea {
  width: 100%;
  min-height: 84px;
  resize: vertical;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg3);
  color: var(--text);
}
.notes-textarea:focus {
  outline: none;
  border-color: var(--accent2);
}
.notes-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 8px;
}
.btn-save-note {
  padding: 6px 12px;
  border: 1px solid var(--accent2);
  border-radius: 8px;
  background: var(--accent2);
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.btn-save-note:hover { opacity: .92; }
.btn-save-note.saved {
  background: var(--green);
  border-color: var(--green);
}
.save-tip {
  font-size: 12px;
  color: var(--green);
  min-height: 18px;
}

/* ── Tab bar ── */
.tab-bar {
  display: flex; gap: 0;
  border-top: 1px solid var(--border);
  margin-top: 10px;
}
.tab-btn {
  padding: 8px 16px;
  background: none; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2); font-size: 13px; font-family: inherit;
  cursor: pointer; transition: color .15s, border-color .15s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent2);
}

/* ── Author summary ── */
.author-summary {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.summary-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 20px;
  display: flex; flex-direction: column; gap: 5px;
  min-width: 140px;
}
.summary-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
.summary-value { font-size: 20px; font-weight: 700; color: var(--text); }
.summary-value.sm { font-size: 14px; }
.summary-value.ac { color: var(--accent); }

/* ── Author works table ── */
.author-table-wrap {
  overflow-x: auto;
  padding: 16px;
}
.author-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.author-table th {
  text-align: left; padding: 8px 12px;
  color: var(--text3); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.author-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text); vertical-align: middle;
}
.author-table tr:last-child td { border-bottom: none; }
.author-table tbody tr:hover td { background: rgba(255,255,255,.025); }
.author-table tbody tr:hover td { background: #F9FAFB; }
.at-name { font-weight: 600; }
.at-name a { color: var(--text); text-decoration: none; }
.at-name a:hover { color: var(--accent); }
.at-type { color: var(--blue); white-space: nowrap; }
.at-progress { color: var(--text2); white-space: nowrap; }
.at-score { color: var(--amber); }
.at-fav { display: flex; align-items: center; gap: 6px; white-space: nowrap; color: var(--red); }
.value-with-diff {
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.trend-cell {
  min-width: 220px;
}
.trend-wrap {
  display: flex; align-items: center; justify-content: flex-start;
  min-height: 60px;
}
.trend-empty {
  font-size: 12px; color: var(--text3);
}
.trend-canvas {
  width: 200px !important;
  height: 60px !important;
}
.fav-diff {
  font-size: 11px; padding: 2px 6px;
  border-radius: 4px; font-weight: 600; white-space: nowrap;
}
.fav-diff.up   { background: rgba(74,222,128,.12); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.fav-diff.down { background: rgba(248,113,113,.12); color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
.fav-diff.same { color: var(--text3); font-weight: 400; }
.author-empty {
  padding: 60px 24px; text-align: center;
  color: var(--text3); font-size: 14px;
}
.author-empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── PC layout ── */
@media (min-width: 768px) {
  .header { padding: 16px 24px 14px; }
  .header-top { margin-bottom: 14px; }
  .header-title { font-size: 18px; }
  .controls-row {
    display: flex; gap: 12px; align-items: center;
  }
  .search-wrap { flex: 1; margin-bottom: 0; }
  .filter-row { flex-wrap: wrap; overflow: visible; }
  .list-wrap { padding: 16px 24px 60px; max-width: 900px; margin: 0 auto; }
  .list-wrap.grid-mode { padding: 0 0 60px !important; max-width: none; margin: 0; }
  .grid-wrap { padding: 16px 24px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .ctrl-row { padding: 10px 24px; }
  .card-head { padding: 14px 18px; }
  .link-list { padding: 10px 18px; }
  .card-footer { padding: 10px 18px; }
  .book-name { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">晋江维权系统</div>
    <div class="stats-pill" id="stats">加载中...</div>
  </div>
  <div class="controls-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="搜索书名、作者..." oninput="onFilter()">
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn" id="btnStatus" onclick="togglePanel('status')">状态 ▾</button>
      <button class="filter-btn" id="btnChannel" onclick="togglePanel('channel')">频道 ▾</button>
      <button class="filter-btn" id="btnType" onclick="togglePanel('type')">类型 ▾</button>
      <button class="filter-btn" id="btnEra" onclick="togglePanel('era')">年代 ▾</button>
      <button class="filter-btn" id="btnTag" onclick="togglePanel('tag')">标签 ▾</button>
      <button class="filter-btn" id="btnFav" onclick="togglePanel('fav')">收藏数 ▾</button>
      <button class="filter-btn" id="btnPiracy" onclick="togglePanel('piracy')">盗版 ▾</button>
      <button class="filter-btn" onclick="clearAll()" style="color:var(--text3)">清除</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">📋 维权记录</button>
    <button class="tab-btn" id="tab-author" onclick="switchTab('author')">📊 作者数据</button>
  </div>
</div>

<div id="page-books">
<!-- 筛选面板 -->
<div class="filter-panel" id="panel-status">
  <div class="filter-section">
    <div class="filter-label">投诉状态</div>
    <div class="tag-grid" id="statusChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-channel">
  <div class="filter-section">
    <div class="filter-label">频道</div>
    <div class="tag-grid" id="channelChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-type">
  <div class="filter-section">
    <div class="filter-label">作品类型</div>
    <div class="tag-grid" id="typeChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-era">
  <div class="filter-section">
    <div class="filter-label">年代</div>
    <div class="tag-grid" id="eraChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-tag">
  <div class="filter-section">
    <div class="filter-label">标签（可多选）</div>
    <div class="tag-grid" id="tagChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-fav">
  <div class="filter-section">
    <div class="filter-label">最低收藏数</div>
    <div class="range-row">
      <input type="range" id="favRange" min="5" max="100" value="5" step="5" oninput="onFavRange()">
      <span class="range-val" id="favRangeVal">5万+</span>
    </div>
  </div>
</div>
<div class="filter-panel" id="panel-piracy">
  <div class="filter-section">
    <div class="filter-label">盗版情况</div>
    <div class="tag-grid">
      <div class="tag-chip" data-piracy="has" onclick="togglePiracy(this)">有盗版链接</div>
      <div class="tag-chip" data-piracy="none" onclick="togglePiracy(this)">未发现盗版</div>
    </div>
  </div>
</div>

<!-- 视图/排序控制 -->
<div class="ctrl-row">
  <span class="ctrl-label">视图</span>
  <div class="ctrl-group">
    <button class="ctrl-btn view-btn active" id="view-grid" onclick="setView('grid')">⊞ 网格</button>
    <button class="ctrl-btn view-btn" id="view-list" onclick="setView('list')">☰ 列表</button>
  </div>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">排序</span>
  <div class="ctrl-group">
    <button class="ctrl-btn sort-btn active" id="sort-random" onclick="setSort('random')">随机</button>
    <button class="ctrl-btn sort-btn" id="sort-fav_desc" onclick="setSort('fav_desc')">收藏↓</button>
    <button class="ctrl-btn sort-btn" id="sort-fav_asc" onclick="setSort('fav_asc')">收藏↑</button>
    <button class="ctrl-btn sort-btn" id="sort-piracy" onclick="setSort('piracy')">盗版↓</button>
  </div>
</div>

<!-- 书籍详情弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-head" id="modalHead"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-links" id="modalLinks"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="list-wrap" id="listWrap">
  <div id="list"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none"></div>
</div>

<div id="page-author" style="display:none">
  <div id="authorContent"><div class="author-empty"><div class="author-empty-icon">⏳</div>加载中...</div></div>
</div>

<script>
let allBooks = [];
let filtered = [];
let PAGE_SIZE = 30;
let currentPage = 1;
let viewMode = 'grid';    // 'grid' | 'list'
let sortMode = 'random';  // 'random' | 'fav_desc' | 'fav_asc' | 'piracy'
let isLoadingMore = false;
let allLoaded = false;
let authorCharts = [];
let currentModalBook = null;
let currentModalRating = 0;

let activePanel = null;
let selStatus = '';
let selChannel = '';
let selType = '';
let selEra = '';
let selTags = new Set();
let selPiracy = '';
let favMin = 50000;

async function init() {
  try {
    const res = await fetch('/api/books');
    allBooks = await res.json();
    buildFilterOptions();
    applyFilter();
  } catch(e) {
    document.getElementById('list').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>数据加载失败</div>';
  }
  initAuthor();
}

function buildFilterOptions() {
  // 状态
  const statuses = ['待投诉','已投诉','未发现盗版'];
  document.getElementById('statusChips').innerHTML =
    statuses.map(s => `<div class="tag-chip" data-val="${s}" onclick="toggleChip(this,'status')">${s}</div>`).join('');

  // 频道
  const channels = ['全部', '耽美', '言情', '无CP'];
  document.getElementById('channelChips').innerHTML =
    channels.map((c, idx) => `<div class="tag-chip ${idx === 0 ? 'active' : ''}" data-val="${c}" onclick="toggleChip(this,'channel')">${c}</div>`).join('');

  // 类型
  const types = [...new Set(allBooks.map(b => b['类型']).filter(Boolean))].sort();
  document.getElementById('typeChips').innerHTML =
    types.map(t => `<div class="tag-chip" data-val="${t}" onclick="toggleChip(this,'type')">${t}</div>`).join('');

  // 年代（从类型中抽取第3段，如 近代现代 / 架空历史）
  const eras = [...new Set(allBooks.map(b => getBookEra(b)).filter(Boolean))].sort();
  const eraOptions = ['全部', ...eras];
  document.getElementById('eraChips').innerHTML =
    eraOptions.map((e, idx) => `<div class="tag-chip ${idx === 0 ? 'active' : ''}" data-val="${e}" onclick="toggleChip(this,'era')">${e}</div>`).join('')
    || '<span style="color:var(--text3);font-size:12px">暂无年代数据</span>';

  // 标签
  const tagSet = new Set();
  allBooks.forEach(b => getBookTags(b).forEach(t => tagSet.add(t)));
  document.getElementById('tagChips').innerHTML =
    [...tagSet].sort().map(t =>
      `<div class="tag-chip" data-val="${t}" onclick="toggleTag(this)">${t}</div>`
    ).join('') || '<span style="color:var(--text3);font-size:12px">暂无标签数据</span>';

  // 收藏范围固定在 5w~100w
  const slider = document.getElementById('favRange');
  slider.min = 5;
  slider.max = 100;
  slider.value = 5;
  document.getElementById('favRangeVal').textContent = '5万+';
}

function parseFavNum(str) {
  if (!str || str === '未获取') return 0;
  return parseInt(str.replace(/,/g,'')) || 0;
}

function getBookTags(book) {
  if (Array.isArray(book['标签']) && book['标签'].length > 0) {
    return [...new Set(book['标签'].map(t => String(t).trim()).filter(Boolean))];
  }

  const raw = book['内容标签'];
  if (!raw || raw === '未获取') return [];

  return [...new Set(
    String(raw)
      .split(/[、，,|\/\s]+/)
      .map(t => t.trim())
      .filter(Boolean)
  )];
}

function matchBookChannel(book, selectedChannel) {
  if (!selectedChannel) return true;
  const raw = String(book['频道'] || book['类型'] || '').toLowerCase();
  const target = selectedChannel.toLowerCase();

  if (target === '无cp') return raw.includes('无cp');
  return raw.includes(target);
}

function getBookEra(book) {
  const raw = String(book['类型'] || '').trim();
  if (!raw) return '';

  const parts = raw.split('-').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 3) return parts[2];

  const eraCandidates = ['近代现代', '架空历史', '古色古香', '幻想未来', '现代', '历史'];
  for (const era of eraCandidates) {
    if (raw.includes(era)) return era;
  }
  return '';
}

// ── View & Sort ──
function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + mode).classList.add('active');
  renderList();
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  applyFilter();
}

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function sortFiltered() {
  if (sortMode === 'random') {
    shuffleArr(filtered);
  } else if (sortMode === 'fav_desc') {
    filtered.sort((a, b) => parseFavNum(b['收藏数']) - parseFavNum(a['收藏数']));
  } else if (sortMode === 'fav_asc') {
    filtered.sort((a, b) => parseFavNum(a['收藏数']) - parseFavNum(b['收藏数']));
  } else if (sortMode === 'piracy') {
    filtered.sort((a, b) => (b['盗版链接']?.length || 0) - (a['盗版链接']?.length || 0));
  }
}

function togglePanel(name) {
  const panel = document.getElementById(`panel-${name}`);
  if (activePanel && activePanel !== name) {
    document.getElementById(`panel-${activePanel}`).classList.remove('open');
  }
  panel.classList.toggle('open');
  activePanel = panel.classList.contains('open') ? name : null;
}

function toggleChip(el, type) {
  const val = el.dataset.val;
  const container = el.parentElement;
  container.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  if (type === 'status') {
    selStatus = selStatus === val ? '' : val;
    if (selStatus) el.classList.add('active');
    document.getElementById('btnStatus').classList.toggle('has-value', !!selStatus);
  } else if (type === 'type') {
    selType = selType === val ? '' : val;
    if (selType) el.classList.add('active');
    document.getElementById('btnType').classList.toggle('has-value', !!selType);
  } else if (type === 'channel') {
    selChannel = val === '全部' ? '' : val;
    const activeVal = selChannel || '全部';
    container.querySelectorAll('.tag-chip').forEach(c => {
      if (c.dataset.val === activeVal) c.classList.add('active');
    });
    document.getElementById('btnChannel').classList.toggle('has-value', !!selChannel);
  } else if (type === 'era') {
    selEra = val === '全部' ? '' : val;
    const activeVal = selEra || '全部';
    container.querySelectorAll('.tag-chip').forEach(c => {
      if (c.dataset.val === activeVal) c.classList.add('active');
    });
    document.getElementById('btnEra').classList.toggle('has-value', !!selEra);
  }
  applyFilter();
}

function toggleTag(el) {
  const val = el.dataset.val;
  if (selTags.has(val)) { selTags.delete(val); el.classList.remove('active'); }
  else { selTags.add(val); el.classList.add('active'); }
  document.getElementById('btnTag').classList.toggle('has-value', selTags.size > 0);
  applyFilter();
}

function togglePiracy(el) {
  const val = el.dataset.piracy;
  el.parentElement.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  selPiracy = selPiracy === val ? '' : val;
  if (selPiracy) el.classList.add('active');
  document.getElementById('btnPiracy').classList.toggle('has-value', !!selPiracy);
  applyFilter();
}

function onFavRange() {
  const v = parseInt(document.getElementById('favRange').value);
  favMin = v * 10000;
  document.getElementById('favRangeVal').textContent = `${v}万+`;
  document.getElementById('btnFav').classList.toggle('has-value', v > 5);
  applyFilter();
}

function clearAll() {
  selStatus = ''; selChannel = ''; selType = ''; selEra = ''; selTags.clear(); selPiracy = ''; favMin = 50000;
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('has-value'));
  document.getElementById('favRange').value = 5;
  document.getElementById('favRangeVal').textContent = '5万+';
  document.querySelectorAll('#channelChips .tag-chip').forEach(c => {
    if (c.dataset.val === '全部') c.classList.add('active');
  });
  document.querySelectorAll('#eraChips .tag-chip').forEach(c => {
    if (c.dataset.val === '全部') c.classList.add('active');
  });
  document.getElementById('search').value = '';
  applyFilter();
}

function quickFilterTag(tag) {
  if (!tag) return;
  selTags = new Set([tag]);
  document.querySelectorAll('#tagChips .tag-chip').forEach(c => c.classList.remove('active'));
  const target = document.querySelector(`#tagChips .tag-chip[data-val="${CSS.escape(tag)}"]`);
  if (target) target.classList.add('active');
  document.getElementById('btnTag').classList.add('has-value');
  applyFilter();
}

function onFilter() { applyFilter(); }

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filtered = allBooks.filter(b => {
    if (q && !b['书名'].toLowerCase().includes(q) && !b['作者'].toLowerCase().includes(q)) return false;
    if (selStatus && b['投诉状态'] !== selStatus) return false;
    if (selChannel && !matchBookChannel(b, selChannel)) return false;
    if (selType && b['类型'] !== selType) return false;
    if (selEra && getBookEra(b) !== selEra) return false;
    if (selTags.size > 0) {
      const bTags = getBookTags(b);
      if (![...selTags].every(t => bTags.includes(t))) return false;
    }
    if (favMin > 0 && parseFavNum(b['收藏数']) < favMin) return false;
    if (selPiracy === 'has' && (!b['盗版链接'] || b['盗版链接'].length === 0)) return false;
    if (selPiracy === 'none' && b['盗版链接'] && b['盗版链接'].length > 0) return false;
    return true;
  });
  sortFiltered();
  currentPage = 1;
  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  const wrap = document.getElementById('listWrap');
  const loadWrap = document.getElementById('loadMoreWrap');
  const total = filtered.length;
  const piracyTotal = filtered.filter(b => b['盗版链接'] && b['盗版链接'].length > 0).length;
  document.getElementById('stats').textContent = `${total} 本 · ${piracyTotal} 本有盗版`;

  if (total === 0) {
    list.className = '';
    wrap.classList.remove('grid-mode');
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>没有符合条件的书目</div>';
    loadWrap.style.display = 'none';
    return;
  }

  const pageData = filtered.slice(0, currentPage * PAGE_SIZE);
  if (viewMode === 'grid') {
    wrap.classList.add('grid-mode');
    list.className = 'grid-wrap';
    list.innerHTML = pageData.map((b, i) => renderGridCard(b, i)).join('');
  } else {
    wrap.classList.remove('grid-mode');
    list.className = '';
    list.innerHTML = pageData.map((b, i) => renderCard(b, i)).join('');
  }

  updateLoadState();
}

function loadMore() {
  if (isLoadingMore || allLoaded) return;
  isLoadingMore = true;
  updateLoadState();

  window.setTimeout(() => {
  currentPage++;
  const list = document.getElementById('list');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, currentPage * PAGE_SIZE);
  if (viewMode === 'grid') {
    list.insertAdjacentHTML('beforeend', pageData.map((b, i) => renderGridCard(b, start + i)).join(''));
  } else {
    list.insertAdjacentHTML('beforeend', pageData.map((b, i) => renderCard(b, start + i)).join(''));
  }
  isLoadingMore = false;
  updateLoadState();
  }, 250);
}

function updateLoadState() {
  const loadWrap = document.getElementById('loadMoreWrap');
  const shown = Math.min(currentPage * PAGE_SIZE, filtered.length);
  allLoaded = shown >= filtered.length;

  if (!filtered.length) {
    loadWrap.style.display = 'none';
    loadWrap.innerHTML = '';
    return;
  }

  loadWrap.style.display = 'block';
  if (isLoadingMore) {
    loadWrap.innerHTML = '<div class="loading-indicator"><span class="spinner"></span><span>正在加载更多...</span></div>';
    return;
  }

  if (allLoaded) {
    loadWrap.innerHTML = `<div class="load-complete">已显示全部 ${filtered.length} 本</div>`;
    return;
  }

  loadWrap.innerHTML = `<div class="loading-indicator"><span class="spinner"></span><span>下滑自动加载更多（已显示 ${shown}/${filtered.length}）</span></div>`;
}

function onWindowScroll() {
  if (document.getElementById('page-books').style.display === 'none') return;
  if (isLoadingMore || allLoaded || !filtered.length) return;
  const scrollBottom = window.innerHeight + window.scrollY;
  const threshold = document.documentElement.scrollHeight - 200;
  if (scrollBottom >= threshold) {
    loadMore();
  }
}

// ── Grid Card ──
function renderGridCard(b, idx) {
  const links = b['盗版链接'] || [];
  const status = b['投诉状态'] || '待投诉';
  const dotClass = status === '已投诉' ? 'done' : status === '未发现盗版' ? 'none-s' : 'pending';
  const tags = getBookTags(b).slice(0, 3);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : (b['收藏数'] || '?');
  return `
  <div class="g-card" onclick="openModal(${idx})">
    <div class="g-status ${dotClass}" title="${status}"></div>
    <div class="g-card-title">${b['书名']}</div>
    <div class="g-card-author">${b['作者']}</div>
    <div class="g-card-tags">
      ${b['类型'] ? `<span class="g-card-tag type">${b['类型']}</span>` : ''}
      ${tags.map(t => `<span class="g-card-tag content" onclick="event.stopPropagation(); quickFilterTag('${String(t).replace(/'/g, "\\'")}')">${t}</span>`).join('')}
    </div>
    <div class="g-card-bottom">
      <span class="g-card-fav">♥ ${favStr}</span>
      <span class="g-piracy ${links.length > 0 ? 'has' : 'none'}">
        ${links.length > 0 ? `${links.length}条盗版` : '未发现'}
      </span>
    </div>
  </div>`;
}

// ── Modal ──
function openModal(idx) {
  const b = filtered[idx];
  if (!b) return;
  currentModalBook = b;
  currentModalRating = 0;
  const links = b['盗版链接'] || [];
  const status = b['投诉状态'] || '待投诉';
  const tags = getBookTags(b);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : (b['收藏数'] || '?');

  const linksHtml = links.length > 0
    ? links.map((url, j) => `
        <div class="link-item">
          <span class="link-num">${j+1}</span>
          <a class="link-url" href="${url}" target="_blank" rel="noopener">${url}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${url.replace(/'/g,"\\'")}')">复制</button>
        </div>`).join('')
    : '<div class="no-links">未发现盗版链接</div>';

  document.getElementById('modalHead').innerHTML = `
    <div class="modal-head-main">
      <div class="modal-title">${b['书名']}</div>
      <div class="modal-author">${b['作者']}</div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>`;

  document.getElementById('modalMeta').innerHTML = `
    ${b['类型'] ? `<span class="meta-tag" style="color:var(--blue);border-color:rgba(96,165,250,.3)">${b['类型']}</span>` : ''}
    ${b['文章类型'] && b['文章类型'] !== '未获取' ? `<span class="meta-tag" style="color:var(--text2)">${b['文章类型']}</span>` : ''}
    ${tags.map(t => `<span class="meta-tag" style="color:var(--accent);border-color:rgba(168,85,247,.25)">${t}</span>`).join('')}
    <span class="fav-count">♥ ${favStr}</span>`;

  document.getElementById('modalLinks').innerHTML = `<div class="link-list">${linksHtml}</div>`;

  document.getElementById('modalFooter').innerHTML = `
    <span class="footer-label">投诉状态</span>
    <select class="status-select" onchange="updateStatus('${b['书名'].replace(/'/g,"\\'")}', this.value)">
      <option ${status==='待投诉'?'selected':''}>待投诉</option>
      <option ${status==='已投诉'?'selected':''}>已投诉</option>
      <option ${status==='未发现盗版'?'selected':''}>未发现盗版</option>
    </select>
    <a href="${b['晋江链接']}" target="_blank" class="jj-link">晋江原文 →</a>

    <div class="notes-section">
      <div class="notes-title">读后感</div>
      <div class="notes-row">
        <span class="notes-label">阅读状态</span>
        <select class="status-select" id="noteStatus">
          <option>想读</option>
          <option>在读</option>
          <option>已读</option>
        </select>
      </div>
      <div class="notes-row">
        <span class="notes-label">评分</span>
        <div class="star-rating" id="noteStars"></div>
      </div>
      <textarea id="noteText" class="notes-textarea" placeholder="写下你的读后感..."></textarea>
      <div class="notes-actions">
        <button class="btn-save-note" id="noteSaveBtn" onclick="saveCurrentNote()">保存笔记</button>
        <span class="save-tip" id="noteSaveTip"></span>
      </div>
    </div>`;

  renderRatingStars(0);
  loadNoteForBook(b['书名']);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModalBook = null;
  currentModalRating = 0;
}

function renderRatingStars(rating) {
  currentModalRating = rating;
  const box = document.getElementById('noteStars');
  if (!box) return;
  box.innerHTML = [1,2,3,4,5].map(i =>
    `<button class="star-btn ${i <= rating ? 'active' : ''}" onclick="setModalRating(${i})" type="button">★</button>`
  ).join('');
}

function setModalRating(rating) {
  renderRatingStars(rating);
}

async function loadNoteForBook(bookName) {
  try {
    const res = await fetch(`/api/notes/${encodeURIComponent(bookName)}`);
    const payload = await res.json();
    const data = payload && payload.data ? payload.data : null;

    if (!data) {
      renderRatingStars(0);
      const statusEl = document.getElementById('noteStatus');
      const noteEl = document.getElementById('noteText');
      if (statusEl) statusEl.value = '想读';
      if (noteEl) noteEl.value = '';
      return;
    }

    const statusEl = document.getElementById('noteStatus');
    const noteEl = document.getElementById('noteText');
    if (statusEl && ['想读','在读','已读'].includes(data.status)) statusEl.value = data.status;
    if (noteEl) noteEl.value = data.note || '';
    renderRatingStars(Number(data.rating) || 0);
  } catch (e) {
    console.error('加载读后感失败', e);
  }
}

async function saveCurrentNote() {
  if (!currentModalBook) return;

  const statusEl = document.getElementById('noteStatus');
  const noteEl = document.getElementById('noteText');
  const btnEl = document.getElementById('noteSaveBtn');

  const payload = {
    book_name: currentModalBook['书名'],
    author: currentModalBook['作者'],
    rating: currentModalRating,
    status: statusEl ? statusEl.value : '想读',
    note: noteEl ? noteEl.value : '',
  };

  try {
    const res = await fetch('/api/notes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });

    if (!res.ok) throw new Error('save failed');
    
    // 更改按钮状态
    if (btnEl) {
      const originalText = btnEl.textContent;
      btnEl.textContent = '已保存✓';
      btnEl.classList.add('saved');
      btnEl.disabled = true;
      
      setTimeout(() => {
        btnEl.textContent = originalText;
        btnEl.classList.remove('saved');
        btnEl.disabled = false;
      }, 2000);
    }
  } catch (e) {
    console.error('保存读后感失败', e);
    if (btnEl) {
      btnEl.textContent = '保存失败';
      setTimeout(() => {
        btnEl.textContent = '保存笔记';
      }, 1500);
    }
  }
}

// ── List Card (original) ──
function renderCard(b, idx) {
  const links = b['盗版链接'] || [];
  const status = b['投诉状态'] || '待投诉';
  const dotClass = status === '已投诉' ? 'done' : status === '未发现盗版' ? 'none' : 'pending';
  const tags = getBookTags(b).slice(0, 4);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : b['收藏数'];

  const linksHtml = links.length > 0
    ? links.map((url, j) => `
        <div class="link-item">
          <span class="link-num">${j+1}</span>
          <a class="link-url" href="${url}" target="_blank" rel="noopener">${url}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${url.replace(/'/g,"\\'")}')">复制</button>
        </div>`).join('')
    : '<div class="no-links">未发现盗版链接</div>';

  return `
  <div class="card" id="card-${idx}">
    <div class="card-head" onclick="toggleCard(${idx})">
      <div class="card-main">
        <div class="card-title-row">
          <span class="book-name">${b['书名']}</span>
          <span class="book-author">${b['作者']}</span>
        </div>
        <div class="card-meta">
          ${b['类型'] ? `<span class="meta-tag">${b['类型']}</span>` : ''}
          ${tags.map(t => `<span class="meta-tag" style="color:var(--accent);border-color:rgba(168,85,247,.25);cursor:pointer" onclick="event.stopPropagation(); quickFilterTag('${String(t).replace(/'/g, "\\'")}')">${t}</span>`).join('')}
          <span class="fav-count">♥ ${favStr}</span>
        </div>
      </div>
      <div class="card-right">
        <div class="status-dot ${dotClass}" title="${status}"></div>
        <span class="piracy-count ${links.length > 0 ? 'has-piracy' : 'no-piracy'}">
          ${links.length > 0 ? `${links.length}条盗版` : '未发现'}
        </span>
        <span class="chevron" id="chev-${idx}">▶</span>
      </div>
    </div>
    <div class="card-body" id="body-${idx}">
      <div class="link-list">${linksHtml}</div>
      <div class="card-footer">
        <span class="footer-label">投诉状态</span>
        <select class="status-select" onchange="updateStatus('${b['书名'].replace(/'/g,"\\'")}', this.value)">
          <option ${status==='待投诉'?'selected':''}>待投诉</option>
          <option ${status==='已投诉'?'selected':''}>已投诉</option>
          <option ${status==='未发现盗版'?'selected':''}>未发现盗版</option>
        </select>
        <a href="${b['晋江链接']}" target="_blank" class="jj-link">晋江原文 →</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(idx) {
  document.getElementById(`body-${idx}`).classList.toggle('open');
  document.getElementById(`chev-${idx}`).classList.toggle('open');
}

function copyUrl(btn, url) {
  const cleanUrl = String(url || '').trim().replace(/^\[+/, '').replace(/\]+$/, '');
  navigator.clipboard.writeText(cleanUrl).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
  });
}

async function updateStatus(bookName, newStatus) {
  const book = allBooks.find(b => b['书名'] === bookName);
  if (book) book['投诉状态'] = newStatus;
  await fetch('/api/update_status', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({'书名': bookName, '投诉状态': newStatus})
  });
}

function switchTab(tab) {
  document.getElementById('page-books').style.display = tab === 'books' ? '' : 'none';
  document.getElementById('page-author').style.display = tab === 'author'  ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

// ── Author data ──
let authorHistory = [];

async function initAuthor() {
  try {
    const res = await fetch('/api/author_data');
    authorHistory = await res.json();
    // 保持原始顺序：最后一条 = 最新，倒数第二条 = 上次
    renderAuthorPage();
  } catch(e) {
    document.getElementById('authorContent').innerHTML =
      '<div class="author-empty"><div class="author-empty-icon">⚠️</div>author_data.json 加载失败</div>';
  }
}

function numStr(val) {
  const n = parseInt(String(val || '0').replace(/,/g, '').replace(/万/g, ''));
  return isNaN(n) ? 0 : n;
}
function fmtNum(n) { return n.toLocaleString('zh-CN'); }
function fmtFav(n) { return n >= 10000 ? (n / 10000).toFixed(1) + '万' : fmtNum(n); }

// 生成数值差异标签，无变化时返回空字符串
function diffBadge(cur, prevVal) {
  if (prevVal === undefined || prevVal === null) return '';
  const diff = numStr(cur) - numStr(prevVal);
  if (diff > 0) return `<span class="fav-diff up">↑${fmtNum(diff)}</span>`;
  if (diff < 0) return `<span class="fav-diff down">↓${fmtNum(-diff)}</span>`;
  return '';
}

function destroyAuthorCharts() {
  authorCharts.forEach(chart => chart.destroy());
  authorCharts = [];
}

function buildTrendSeries(bookName) {
  return authorHistory
    .map(record => {
      const works = Array.isArray(record['作品列表']) ? record['作品列表'] : [];
      const match = works.find(item => item['书名'] === bookName);
      return match ? numStr(match['收藏数']) : null;
    })
    .filter(value => value !== null);
}

function renderTrendCharts() {
  destroyAuthorCharts();
  document.querySelectorAll('[data-trend-book]').forEach(node => {
    const bookName = node.dataset.trendBook;
    const series = buildTrendSeries(bookName);
    if (series.length <= 1) {
      node.innerHTML = '<span class="trend-empty">暂无趋势数据</span>';
      return;
    }

    node.innerHTML = `<canvas class="trend-canvas" width="200" height="60"></canvas>`;
    const canvas = node.querySelector('canvas');
    const chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: series.map((_, index) => index + 1),
        datasets: [{
          data: series,
          borderColor: '#6366F1',
          backgroundColor: 'rgba(99,102,241,0.08)',
          borderWidth: 2,
          tension: 0.35,
          pointRadius: 0,
          fill: true,
        }],
      },
      options: {
        responsive: false,
        animation: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false, grid: { display: false } },
          y: { display: false, grid: { display: false } },
        },
        elements: { line: { capBezierPoints: true } },
      },
    });
    authorCharts.push(chart);
  });
}

function renderAuthorPage() {
  const el = document.getElementById('authorContent');
  if (!authorHistory.length) {
    el.innerHTML = '<div class="author-empty"><div class="author-empty-icon">📭</div>暂无数据，请先运行爬虫生成 author_data.json</div>';
    return;
  }

  // 最后一条 = 最新，倒数第二条 = 上次
  const latest = authorHistory[authorHistory.length - 1];
  const prev   = authorHistory.length > 1 ? authorHistory[authorHistory.length - 2] : null;

  // 构建上次书籍 map
  const prevMap = {};
  if (prev && Array.isArray(prev['作品列表'])) {
    prev['作品列表'].forEach(b => { prevMap[b['书名']] = b; });
  }

  const works     = latest['作品列表'] || [];
  const authorFav = numStr(latest['作者被收藏']);

  // 作者被收藏变化
  const authorFavDiff = prev ? diffBadge(latest['作者被收藏'], prev['作者被收藏']) : '';

  // ── Summary cards ──
  const summaryHtml = `
    <div class="summary-card">
      <div class="summary-label">最新抓取时间</div>
      <div class="summary-value sm">${latest['抓取时间'] || '未知'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">作者被收藏</div>
      <div class="summary-value ac" style="display:flex;align-items:center;gap:8px">
        ♥ ${fmtFav(authorFav)} ${authorFavDiff}
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-label">作品数量</div>
      <div class="summary-value">${works.length}</div>
    </div>
    ${authorHistory.length > 1 ? `
    <div class="summary-card">
      <div class="summary-label">对比基准</div>
      <div class="summary-value sm" style="color:var(--text2)">${prev['抓取时间'] || '上次'}</div>
    </div>` : ''}`;

  // ── Table rows ──
  const rowsHtml = works.map(book => {
    const name     = book['书名']  || '';
    const progress = book['进度']  || '';
    const words    = book['字数']  || '';
    const score    = book['积分']  || '';
    const fav      = numStr(book['收藏数']);
    const link     = book['链接']  || '';

    const pb = prevMap[name] || null;
    const favDiff   = pb ? diffBadge(book['收藏数'],  pb['收藏数'])  : '';
    const scoreDiff = pb ? diffBadge(book['积分'],    pb['积分'])    : '';
    const wordDiff  = pb ? diffBadge(book['字数'],    pb['字数'])    : '';

    const nameCell = link
      ? `<a href="${link}" target="_blank" rel="noopener">${name}</a>`
      : name;

    return `<tr>
      <td class="at-name">${nameCell}</td>
      <td><div class="at-fav">♥ ${fmtFav(fav)} ${favDiff}</div></td>
      <td class="at-score"><span class="value-with-diff">${score} ${scoreDiff}</span></td>
      <td style="color:var(--text2)"><span class="value-with-diff">${words} ${wordDiff}</span></td>
      <td class="at-progress">${progress}</td>
      <td class="trend-cell"><div class="trend-wrap" data-trend-book="${name.replace(/"/g, '&quot;')}"></div></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="author-summary">${summaryHtml}</div>
    <div class="author-table-wrap">
      <table class="author-table">
        <thead><tr>
          <th>书名</th>
          <th>收藏数</th>
          <th>积分</th>
          <th>字数</th>
          <th>进度</th>
          <th>趋势</th>
        </tr></thead>
        <tbody>${rowsHtml || '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">暂无作品数据</td></tr>'}</tbody>
      </table>
    </div>`;

  renderTrendCharts();
}
