<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="晋江维权">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<title>晋江版权维权系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8F9FA;
  --bg2: #FFFFFF;
  --bg3: #F3F4F6;
  --border: #E5E7EB;
  --border2: #D1D5DB;
  --text: #1F2937;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --accent: #6366F1;
  --accent2: #6366F1;
  --red: #EF4444;
  --green: #10B981;
  --amber: #F59E0B;
  --blue: #4F46E5;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
}

html { font-size: 15px; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(248,249,250,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.header-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.header-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #4F46E5, #6366F1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  flex: 1;
}
.stats-pill {
  font-size: 11px; color: var(--text2);
  background: var(--bg2); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
}

.read-stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}
.read-stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.read-stat-card.clickable {
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
.read-stat-card.clickable:hover {
  border-color: var(--accent2);
  transform: translateY(-1px);
}
.read-stat-card.active-filter {
  border-color: var(--accent2);
  box-shadow: 0 0 0 1px rgba(99,102,241,.25), var(--shadow-sm);
}
.read-stat-label {
  font-size: 11px;
  color: var(--text3);
}
.read-stat-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: border-color .2s;
}
.search-wrap input:focus { outline: none; border-color: var(--accent2); }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 15px; pointer-events: none;
}

/* ── Filter row ── */
.filter-row {
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
  padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-btn {
  flex-shrink: 0; padding: 6px 12px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active {
  background: var(--accent2); border-color: var(--accent2);
  color: #fff;
}
.filter-btn.has-value {
  border-color: var(--accent2); color: var(--accent);
}

/* ── Filter panel ── */
.filter-panel {
  display: none;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.filter-panel.open { display: block; }
.filter-section { margin-bottom: 14px; }
.filter-section:last-child { margin-bottom: 0; }
.filter-label {
  font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 8px;
}
.tag-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.tag-chip {
  padding: 5px 11px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.tag-chip:hover { border-color: var(--border2); color: var(--text); }
.tag-chip.active {
  background: rgba(168,85,247,.15);
  border-color: var(--accent2); color: var(--accent);
}
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type=range] {
  flex: 1; accent-color: var(--accent2);
  height: 4px;
}
.range-val { font-size: 12px; color: var(--text2); min-width: 60px; }

/* ── List ── */
.list-wrap { padding: 12px 12px 80px; }

/* ── Card ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  box-shadow: var(--shadow-sm);
}
.card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }

.card-head {
  padding: 12px 14px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px;
}
.card-main { flex: 1; min-width: 0; }
.card-title-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px; flex-wrap: wrap;
}
.book-name {
  font-size: 15px; font-weight: 700;
  color: var(--text);
}
.book-author { font-size: 12px; color: var(--text2); }
.card-meta {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.meta-tag {
  font-size: 11px; padding: 2px 7px;
  border-radius: 4px; border: 1px solid var(--border);
  color: var(--text3);
}
.fav-count {
  font-size: 11px; color: var(--red);
  display: flex; align-items: center; gap: 3px;
}

.read-status-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-weight: 600;
}
.read-status-badge.done {
  color: var(--green);
  background: rgba(16,185,129,.14);
  border-color: rgba(16,185,129,.35);
}
.read-status-badge.reading {
  color: var(--blue);
  background: rgba(79,70,229,.12);
  border-color: rgba(79,70,229,.3);
}
.read-status-badge.todo {
  color: var(--text2);
  background: var(--bg3);
  border-color: var(--border2);
}

.card-right {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 6px; flex-shrink: 0;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.pending { background: var(--amber); }
.status-dot.done { background: var(--green); }
.status-dot.none { background: var(--text3); }

.piracy-count {
  font-size: 11px; padding: 2px 8px;
  border-radius: 4px; font-weight: 500;
}
.piracy-count.has-piracy {
  background: rgba(248,113,113,.12);
  color: var(--red); border: 1px solid rgba(248,113,113,.25);
}
.piracy-count.no-piracy {
  background: var(--bg3);
  color: var(--text3); border: 1px solid var(--border);
}

.chevron {
  font-size: 12px; color: var(--text3);
  transition: transform .2s; margin-top: 2px;
}
.chevron.open { transform: rotate(90deg); }

/* ── Card body ── */
.card-body { display: none; border-top: 1px solid var(--border); }
.card-body.open { display: block; }

.link-list { padding: 10px 14px; }
.link-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.link-item:last-child { border-bottom: none; }
.link-num {
  font-size: 11px; color: var(--text3);
  min-width: 18px;
}
.link-url {
  flex: 1; min-width: 0;
  font-size: 12px; color: var(--blue);
  text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.link-url:hover { text-decoration: underline; }
.btn-copy {
  flex-shrink: 0; font-size: 11px;
  padding: 3px 8px; border-radius: 5px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.btn-copy:hover { border-color: var(--border2); color: var(--text); }
.btn-copy.copied { color: var(--green); border-color: var(--green); }

.no-links {
  padding: 14px; text-align: center;
  font-size: 13px; color: var(--text3);
}

.card-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.footer-label { font-size: 12px; color: var(--text3); }
.status-select {
  font-size: 12px; padding: 4px 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: inherit;
  cursor: pointer;
}
.status-select:focus { outline: none; border-color: var(--accent2); }
.jj-link {
  font-size: 12px; color: var(--text3);
  text-decoration: none; margin-left: auto;
}
.jj-link:hover { color: var(--accent); }

/* ── Empty ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── Load more ── */
.load-more-wrap { text-align: center; padding: 16px; }
.loading-indicator {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 13px; box-shadow: var(--shadow-sm);
}
.spinner {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid #C7D2FE; border-top-color: var(--accent2);
  animation: spin 0.9s linear infinite;
}
.load-complete {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 14px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 13px; box-shadow: var(--shadow-sm);
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-more-btn {
  padding: 10px 24px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.load-more-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── View / Sort controls ── */
.ctrl-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.ctrl-group { display: flex; gap: 4px; flex-wrap: wrap; }
.ctrl-btn {
  padding: 5px 10px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.ctrl-btn:hover { border-color: var(--border2); color: var(--text); }
.ctrl-btn.active {
  background: rgba(168,85,247,.15);
  border-color: var(--accent2); color: var(--accent);
}
.ctrl-sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }
.ctrl-label { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ── Grid layout ── */
.grid-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  padding: 12px;
}
.list-wrap.grid-mode { padding: 0 0 80px !important; }

/* ── Grid card ── */
.g-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  cursor: pointer; transition: border-color .2s, transform .15s, box-shadow .2s;
  display: flex; flex-direction: column; gap: 7px;
  position: relative; min-height: 130px;
  box-shadow: var(--shadow-sm);
}
.g-card:hover {
  border-color: var(--accent2); transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.g-card-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  line-height: 1.4; padding-right: 14px;
}
.g-card-author { font-size: 11px; color: var(--text2); }
.g-card-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.g-card-tag {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; border: 1px solid var(--border); color: var(--text3);
}
.g-card-tag.type { border-color: rgba(96,165,250,.3); color: var(--blue); }
.g-card-tag.content { border-color: rgba(99,102,241,.22); color: var(--accent); }
.g-card-bottom {
  display: flex; align-items: center;
  justify-content: space-between; margin-top: auto; padding-top: 6px;
  border-top: 1px solid var(--border);
}
.g-card-fav { font-size: 11px; color: var(--red); }
.g-piracy {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; font-weight: 500;
}
.g-piracy.has { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
.g-piracy.none { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.g-status {
  position: absolute; top: 10px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%;
}
.g-status.pending { background: var(--amber); }
.g-status.done { background: var(--green); }
.g-status.none-s { background: var(--text3); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(31,41,55,.18); backdrop-filter: blur(8px);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 24px 48px rgba(15, 23, 42, 0.16);
}
.modal-head {
  padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg2); z-index: 1;
  display: flex; align-items: flex-start; gap: 10px;
}
.modal-head-main { flex: 1; min-width: 0; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.modal-author { font-size: 12px; color: var(--text2); }
.modal-close {
  background: none; border: none; color: var(--text3);
  font-size: 20px; cursor: pointer; padding: 0 4px;
  line-height: 1; flex-shrink: 0;
}
.modal-close:hover { color: var(--text); }
.modal-meta {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.modal-links { border-bottom: 1px solid var(--border); }
.modal-footer { padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.notes-section {
  width: 100%;
  border-top: 1px solid var(--border);
  margin-top: 10px;
  padding-top: 12px;
}
.notes-title {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 600;
}
.notes-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.notes-label {
  font-size: 12px;
  color: var(--text3);
  min-width: 64px;
}
.star-rating {
  display: inline-flex;
  gap: 4px;
}
.star-btn {
  border: none;
  background: transparent;
  color: #D1D5DB;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
}
.star-btn.active { color: #F59E0B; }
.notes-textarea {
  width: 100%;
  min-height: 84px;
  resize: vertical;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg3);
  color: var(--text);
}
.notes-textarea:focus {
  outline: none;
  border-color: var(--accent2);
}
.notes-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 8px;
}
.btn-save-note {
  padding: 6px 12px;
  border: 1px solid var(--accent2);
  border-radius: 8px;
  background: var(--accent2);
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.btn-save-note:hover { opacity: .92; }
.btn-save-note.saved {
  background: var(--green);
  border-color: var(--green);
}
.save-tip {
  font-size: 12px;
  color: var(--green);
  min-height: 18px;
}

/* ── Media library ── */
.media-wrap { padding: 12px 12px 80px; }
.media-filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 0 10px;
  scrollbar-width: none;
}
.media-filter-row::-webkit-scrollbar { display: none; }
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}
.media-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.media-cover {
  width: 100%;
  aspect-ratio: 3 / 4;
  background: linear-gradient(135deg, #6366F1, #4F46E5);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.media-cover-title {
  color: #FFFFFF;
  font-size: 18px;
  line-height: 1.4;
  font-weight: 700;
  text-align: center;
  white-space: normal;
  word-break: break-word;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
}
.media-body {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.media-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.media-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.media-rating { color: var(--amber); }
.media-source { color: var(--text2); }
.media-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 36px;
}
.media-actions {
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.media-check {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text2);
}
.btn-note {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.btn-note:hover {
  color: var(--text);
  border-color: var(--border2);
}
.media-note-modal .modal-box { max-width: 520px; }
.note-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  padding: 9px 10px;
}
.note-input:focus {
  outline: none;
  border-color: var(--accent2);
}
.media-modal-body {
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.media-modal-actions {
  padding: 0 18px 16px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Bookmarks ── */
.bookmark-wrap { padding: 12px 12px 80px; }
.bookmark-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.bookmark-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.bookmark-tag-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}
.bookmark-tag-row::-webkit-scrollbar { display: none; }
.bookmark-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.bookmark-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bookmark-link {
  color: var(--text);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.4;
  word-break: break-word;
}
.bookmark-link:hover { color: var(--accent); }
.bookmark-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.bookmark-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.bookmark-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid transparent;
}
.bookmark-note {
  font-size: 12px;
  color: var(--text2);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.bookmark-actions {
  display: flex;
  justify-content: flex-end;
}
.bookmark-form {
  padding: 14px 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bookmark-label {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
}
.bookmark-input-wrap { display: flex; flex-direction: column; }
.bookmark-tag-preset {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.bookmark-form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Image bed ── */
.image-bed-wrap { padding: 12px 12px 80px; }
.image-upload-zone {
  border: 1px dashed var(--border2);
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 22px 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: border-color .18s, transform .15s, box-shadow .2s;
}
.image-upload-zone:hover {
  border-color: var(--accent2);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.image-upload-zone.dragover {
  border-color: var(--accent2);
  background: rgba(99,102,241,.06);
}
.image-upload-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.image-upload-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 6px;
}
.image-upload-tip {
  margin-top: 10px;
  min-height: 18px;
  font-size: 12px;
  color: var(--text3);
}
.image-upload-tip.ok { color: var(--green); }
.image-upload-tip.err { color: var(--red); }
.image-bed-list {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}
.image-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.image-thumb-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.image-thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.image-card-body {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.image-name {
  font-size: 12px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.image-url-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.image-url-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  background: var(--bg3);
  color: var(--blue);
  cursor: pointer;
}
.image-url-input:focus {
  outline: none;
  border-color: var(--accent2);
}
.image-copy-tip {
  font-size: 11px;
  color: var(--text3);
  min-height: 16px;
}
.image-copy-tip.ok { color: var(--green); }
.image-actions {
  display: flex;
  justify-content: flex-end;
}

/* ── Rankings ── */
.rank-wrap { padding: 12px 12px 80px; }
.rank-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.rank-label {
  font-size: 12px;
  color: var(--text2);
}
.rank-date-select {
  min-width: 180px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.rank-date-select:focus {
  outline: none;
  border-color: var(--accent2);
}
.rank-summary {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 10px;
}
.rank-table-wrap {
  overflow-x: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.rank-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.rank-table th {
  text-align: left;
  padding: 9px 12px;
  color: var(--text3);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .07em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.rank-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.rank-table tr:last-child td { border-bottom: none; }
.rank-table tbody tr:hover td { background: #F9FAFB; }
.rank-num {
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}
.rank-title {
  font-weight: 600;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.rank-title-link {
  color: inherit;
  text-decoration: none;
}
.rank-title-link:hover { text-decoration: underline; }
.rank-author {
  color: var(--text2);
  white-space: nowrap;
}
.rank-fav {
  color: var(--red);
  white-space: nowrap;
}
.rank-delta {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.rank-delta.up { color: var(--green); }
.rank-delta.down { color: var(--red); }
.rank-delta.same { color: var(--text3); font-weight: 500; }

/* ── Weekly rankings ── */
.weekly-wrap { padding: 12px 12px 80px; }
.weekly-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.weekly-toolbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.weekly-channel-row {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.weekly-channel-row::-webkit-scrollbar { display: none; }
.weekly-level2-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 2px;
  margin-bottom: 10px;
}
.weekly-combobox {
  position: relative;
  width: 100%;
}
.weekly-combobox-input {
  width: 100%;
  padding: 7px 36px 7px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.weekly-combobox-input:focus {
  outline: none;
  border-color: var(--accent2);
}
.weekly-combobox-arrow {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 12px;
  pointer-events: none;
}
.weekly-combobox-btn {
  position: absolute;
  right: 0;
  top: 0;
  width: 34px;
  height: 100%;
  border: none;
  background: transparent;
  cursor: pointer;
}
.weekly-combobox-list {
  position: absolute;
  left: 0;
  right: 0;
  top: calc(100% + 6px);
  max-height: 280px;
  overflow-y: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  z-index: 20;
}
.weekly-combobox-option {
  width: 100%;
  text-align: left;
  border: none;
  background: transparent;
  color: var(--text);
  padding: 9px 10px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
}
.weekly-combobox-option:hover,
.weekly-combobox-option.active {
  background: var(--bg3);
}
.weekly-summary {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 10px;
}
.weekly-groups {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.weekly-level1 {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.weekly-level1-head {
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(79,70,229,.08), rgba(99,102,241,.03));
}
.weekly-level2-block {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.weekly-level2-block:last-child { border-bottom: none; }
.weekly-level2-title {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: #047857;
  background: rgba(16,185,129,.16);
  border: 1px solid rgba(16,185,129,.35);
  margin-bottom: 8px;
}
.weekly-item-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.weekly-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
}
.weekly-item-title {
  color: var(--text);
  font-weight: 600;
}
.weekly-item-id {
  font-size: 12px;
  color: var(--blue);
  text-decoration: none;
}
.weekly-item-id:hover { text-decoration: underline; }

/* ── Tab bar ── */
.tab-bar {
  display: flex; gap: 0;
  border-top: 1px solid var(--border);
  margin-top: 10px;
}
.tab-btn {
  padding: 8px 16px;
  background: none; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2); font-size: 13px; font-family: inherit;
  cursor: pointer; transition: color .15s, border-color .15s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent2);
}

/* ── Author summary ── */
.author-summary {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.summary-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 20px;
  display: flex; flex-direction: column; gap: 5px;
  min-width: 140px;
}
.summary-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
.summary-value { font-size: 20px; font-weight: 700; color: var(--text); }
.summary-value.sm { font-size: 14px; }
.summary-value.ac { color: var(--accent); }

/* ── Author works table ── */
.author-table-wrap {
  overflow-x: auto;
  padding: 16px;
}
.author-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.author-table th {
  text-align: left; padding: 8px 12px;
  color: var(--text3); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.author-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text); vertical-align: middle;
}
.author-table tr:last-child td { border-bottom: none; }
.author-table tbody tr:hover td { background: rgba(255,255,255,.025); }
.author-table tbody tr:hover td { background: #F9FAFB; }
.at-name { font-weight: 600; }
.at-name a { color: var(--text); text-decoration: none; }
.at-name a:hover { color: var(--accent); }
.at-type { color: var(--blue); white-space: nowrap; }
.at-progress { color: var(--text2); white-space: nowrap; }
.at-score { color: var(--amber); }
.at-fav { display: flex; align-items: center; gap: 6px; white-space: nowrap; color: var(--red); }
.value-with-diff {
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.trend-cell {
  min-width: 220px;
}
.trend-wrap {
  display: flex; align-items: center; justify-content: flex-start;
  min-height: 60px;
}
.trend-empty {
  font-size: 12px; color: var(--text3);
}
.trend-canvas {
  width: 200px !important;
  height: 60px !important;
}
.fav-diff {
  font-size: 11px; padding: 2px 6px;
  border-radius: 4px; font-weight: 600; white-space: nowrap;
}
.fav-diff.up   { background: rgba(74,222,128,.12); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.fav-diff.down { background: rgba(248,113,113,.12); color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
.fav-diff.same { color: var(--text3); font-weight: 400; }
.author-empty {
  padding: 60px 24px; text-align: center;
  color: var(--text3); font-size: 14px;
}
.author-empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── PC layout ── */
@media (min-width: 768px) {
  .header { padding: 16px 24px 14px; }
  .header-top { margin-bottom: 14px; }
  .header-title { font-size: 18px; }
  .controls-row {
    display: flex; gap: 12px; align-items: center;
  }
  .search-wrap { flex: 1; margin-bottom: 0; }
  .filter-row { flex-wrap: wrap; overflow: visible; }
  .list-wrap { padding: 16px 24px 60px; max-width: 900px; margin: 0 auto; }
  .list-wrap.grid-mode { padding: 0 0 60px !important; max-width: none; margin: 0; }
  .grid-wrap { padding: 16px 24px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .ctrl-row { padding: 10px 24px; }
  .card-head { padding: 14px 18px; }
  .link-list { padding: 10px 18px; }
  .card-footer { padding: 10px 18px; }
  .book-name { font-size: 16px; }
  .media-wrap { padding: 16px 24px 60px; }
  .image-bed-wrap { padding: 16px 24px 60px; }
  .rank-wrap { padding: 16px 24px 60px; }
  .weekly-wrap { padding: 16px 24px 60px; }
  .bookmark-wrap { padding: 16px 24px 60px; }
  .bookmark-list { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
}
@media (max-width: 520px) {
  .read-stats-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">晋江维权系统</div>
    <div class="stats-pill" id="stats">加载中...</div>
  </div>
  <div class="controls-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="搜索书名、作者..." oninput="onFilter()">
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn" id="btnStatus" onclick="togglePanel('status')">状态 ▾</button>
      <button class="filter-btn" id="btnReadStatus" onclick="togglePanel('read-status')">阅读状态 ▾</button>
      <button class="filter-btn" id="btnReadRating" onclick="togglePanel('read-rating')">评分 ▾</button>
      <button class="filter-btn" id="btnChannel" onclick="togglePanel('channel')">频道 ▾</button>
      <button class="filter-btn" id="btnType" onclick="togglePanel('type')">类型 ▾</button>
      <button class="filter-btn" id="btnEra" onclick="togglePanel('era')">年代 ▾</button>
      <button class="filter-btn" id="btnTag" onclick="togglePanel('tag')">标签 ▾</button>
      <button class="filter-btn" id="btnFav" onclick="togglePanel('fav')">收藏数 ▾</button>
      <button class="filter-btn" id="btnPiracy" onclick="togglePanel('piracy')">盗版 ▾</button>
      <button class="filter-btn" onclick="clearAll()" style="color:var(--text3)">清除</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">📋 维权记录</button>
    <button class="tab-btn" id="tab-media" onclick="switchTab('media')">🎬 素材库</button>
    <button class="tab-btn" id="tab-images" onclick="switchTab('images')">🖼️ 图床</button>
    <button class="tab-btn" id="tab-rankings" onclick="switchTab('rankings')">🏆 千字收益榜</button>
    <button class="tab-btn" id="tab-jinbang" onclick="switchTab('jinbang')">🏆 金榜</button>
    <button class="tab-btn" id="tab-weekly" onclick="switchTab('weekly')">📅 周榜</button>
    <button class="tab-btn" id="tab-bookmarks" onclick="switchTab('bookmarks')">⭐ 收藏夹</button>
    <button class="tab-btn" id="tab-author" onclick="switchTab('author')">📊 作者数据</button>
  </div>
</div>

<div id="page-books">
<div class="ctrl-row" style="padding-top:10px;padding-bottom:10px;">
  <div class="read-stats-row" style="width:100%;" id="readStatsRow">
    <div class="read-stat-card"><div class="read-stat-label">总书目</div><div class="read-stat-value" id="statTotalBooks">0</div></div>
    <div class="read-stat-card clickable" id="readStatDoneCard" onclick="toggleReadStatusStat('已读')"><div class="read-stat-label">已读</div><div class="read-stat-value" id="statReadDone">0</div></div>
    <div class="read-stat-card clickable" id="readStatReadingCard" onclick="toggleReadStatusStat('在读')"><div class="read-stat-label">在读</div><div class="read-stat-value" id="statReading">0</div></div>
    <div class="read-stat-card clickable" id="readStatTodoCard" onclick="toggleReadStatusStat('想读')"><div class="read-stat-label">想读</div><div class="read-stat-value" id="statReadTodo">0</div></div>
  </div>
</div>
<!-- 筛选面板 -->
<div class="filter-panel" id="panel-status">
  <div class="filter-section">
    <div class="filter-label">投诉状态</div>
    <div class="tag-grid" id="statusChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-read-status">
  <div class="filter-section">
    <div class="filter-label">阅读状态</div>
    <div class="tag-grid" id="readStatusChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-read-rating">
  <div class="filter-section">
    <div class="filter-label">评分</div>
    <div class="tag-grid" id="readRatingChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-channel">
  <div class="filter-section">
    <div class="filter-label">频道</div>
    <div class="tag-grid" id="channelChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-type">
  <div class="filter-section">
    <div class="filter-label">作品类型</div>
    <div class="tag-grid" id="typeChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-era">
  <div class="filter-section">
    <div class="filter-label">年代</div>
    <div class="tag-grid" id="eraChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-tag">
  <div class="filter-section">
    <div class="filter-label">标签（可多选）</div>
    <div class="tag-grid" id="tagChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-fav">
  <div class="filter-section">
    <div class="filter-label">收藏数区间</div>
    <div class="tag-grid" id="favChips"></div>
  </div>
</div>
<div class="filter-panel" id="panel-piracy">
  <div class="filter-section">
    <div class="filter-label">盗版情况</div>
    <div class="tag-grid">
      <div class="tag-chip" data-piracy="has" onclick="togglePiracy(this)">有盗版链接</div>
      <div class="tag-chip" data-piracy="none" onclick="togglePiracy(this)">未发现盗版</div>
    </div>
  </div>
</div>

<!-- 视图/排序控制 -->
<div class="ctrl-row">

function getChipSetByType(type) {
  if (type === 'status') return selStatus;
  if (type === 'read-status') return selReadStatus;
  if (type === 'read-rating') return selReadRating;
  if (type === 'channel') return selChannel;
  if (type === 'type') return selType;
  if (type === 'era') return selEra;
  return null;
}

function getChipContainerIdByType(type) {
  if (type === 'status') return 'statusChips';
  if (type === 'read-status') return 'readStatusChips';
  if (type === 'read-rating') return 'readRatingChips';
  if (type === 'channel') return 'channelChips';
  if (type === 'type') return 'typeChips';
  if (type === 'era') return 'eraChips';
  return '';
}

function getFilterButtonIdByType(type) {
  if (type === 'status') return 'btnStatus';
  if (type === 'read-status') return 'btnReadStatus';
  if (type === 'read-rating') return 'btnReadRating';
  if (type === 'channel') return 'btnChannel';
  if (type === 'type') return 'btnType';
  if (type === 'era') return 'btnEra';
  return '';
}

function syncChipState(type) {
  const setRef = getChipSetByType(type);
  const container = document.getElementById(getChipContainerIdByType(type));
  const btn = document.getElementById(getFilterButtonIdByType(type));
  if (!setRef || !container) return;

  const chips = container.querySelectorAll('.tag-chip');
  chips.forEach(chip => {
    const val = String(chip.dataset.val || '').trim();
    const active = val === '全部' ? setRef.size === 0 : setRef.has(val);
    chip.classList.toggle('active', active);
  });

  if (btn) btn.classList.toggle('has-value', setRef.size > 0);
  if (type === 'read-status') updateReadStatusCards();
}

function updateReadStatusCards() {
  const doneCard = document.getElementById('readStatDoneCard');
  const readingCard = document.getElementById('readStatReadingCard');
  const todoCard = document.getElementById('readStatTodoCard');
  if (doneCard) doneCard.classList.toggle('active-filter', selReadStatus.has('已读'));
  if (readingCard) readingCard.classList.toggle('active-filter', selReadStatus.has('在读'));
  if (todoCard) todoCard.classList.toggle('active-filter', selReadStatus.has('想读'));
}

function toggleReadStatusStat(status) {
  if (!['已读', '在读', '想读'].includes(status)) return;
  if (selReadStatus.has(status)) selReadStatus.delete(status);
  else selReadStatus.add(status);
  syncChipState('read-status');
  applyFilter();
}

function buildFilterOptions() {
  // 状态
  const statuses = ['待投诉','已投诉','未发现盗版'];
  document.getElementById('statusChips').innerHTML =
    statuses.map(s => `<div class="tag-chip" data-val="${s}" onclick="toggleChip(this,'status')">${s}</div>`).join('');

  const readStatuses = ['全部', '已读', '在读', '想读', '未标记'];
  document.getElementById('readStatusChips').innerHTML =
    readStatuses.map(s => `<div class="tag-chip" data-val="${s}" onclick="toggleChip(this,'read-status')">${s}</div>`).join('');

  const readRatings = ['全部', '5星', '4星', '3星', '2星', '1星', '未评分'];
  document.getElementById('readRatingChips').innerHTML =
    readRatings.map(s => `<div class="tag-chip" data-val="${s}" onclick="toggleChip(this,'read-rating')">${s}</div>`).join('');

  // 频道
  const channels = ['全部', '纯爱', '言情', '无CP'];
  document.getElementById('channelChips').innerHTML =
    channels.map(c => `<div class="tag-chip" data-val="${c}" onclick="toggleChip(this,'channel')">${c}</div>`).join('');

  // 类型
  const types = [...new Set(allBooks.map(b => b['类型']).filter(Boolean))].sort();
  document.getElementById('typeChips').innerHTML =
    types.map(t => `<div class="tag-chip" data-val="${t}" onclick="toggleChip(this,'type')">${t}</div>`).join('');

  // 年代（从类型中抽取第3段，如 近代现代 / 架空历史）
  const eras = [...new Set(allBooks.map(b => getBookEra(b)).filter(Boolean))].sort();
  const eraOptions = ['全部', ...eras];
  document.getElementById('eraChips').innerHTML =
    eraOptions.map(e => `<div class="tag-chip" data-val="${e}" onclick="toggleChip(this,'era')">${e}</div>`).join('')
    || '<span style="color:var(--text3);font-size:12px">暂无年代数据</span>';

  // 标签
  const tagSet = new Set();
  allBooks.forEach(b => getBookTags(b).forEach(t => tagSet.add(t)));
  document.getElementById('tagChips').innerHTML =
    [...tagSet].sort().map(t =>
      `<div class="tag-chip" data-val="${t}" onclick="toggleTag(this)">${t}</div>`
    ).join('') || '<span style="color:var(--text3);font-size:12px">暂无标签数据</span>';

  // 收藏范围改为按数据自适应上限，避免 100w 区间样本过少
  const favOptions = [
    { label: '全部', min: 0, max: 0 },
    { label: '5w以下', min: 0, max: 50000 },
    { label: '5-20w', min: 50000, max: 200000 },
    { label: '20-50w', min: 200000, max: 500000 },
    { label: '50-100w', min: 500000, max: 1000000 },
    { label: '100w+', min: 1000000, max: 0 },
  ];
  document.getElementById('favChips').innerHTML =
    favOptions.map(option => `<div class="tag-chip" data-val="${option.label}" onclick="toggleFavRange(this)">${option.label}</div>`).join('');
  favMin = 0;
  favMax = 0;
  selectedFavRange = '全部';
  document.getElementById('btnFav').classList.remove('has-value');

  syncChipState('status');
  syncChipState('read-status');
  syncChipState('read-rating');
  syncChipState('channel');
  syncChipState('type');
  syncChipState('era');
  document.getElementById('btnTag').classList.toggle('has-value', selTags.size > 0);
}

function parseFavNum(str) {
  if (str === null || str === undefined) return 0;
  if (typeof str === 'number' && Number.isFinite(str)) return Math.max(0, Math.round(str));

  const raw = String(str).trim();
  if (!raw || raw === '未获取') return 0;

  const matched = raw.match(/([\d,.]+)\s*(亿|万)?/);
  if (!matched) return 0;

  const num = parseFloat(matched[1].replace(/,/g, ''));
  if (!Number.isFinite(num)) return 0;

  const unit = matched[2] || '';
  const multiplier = unit === '亿' ? 100000000 : unit === '万' ? 10000 : 1;
  return Math.max(0, Math.round(num * multiplier));
}

function getBookTags(book) {
  if (Array.isArray(book['标签']) && book['标签'].length > 0) {
    return [...new Set(book['标签'].map(t => String(t).trim()).filter(Boolean))];
  }

  const raw = book['内容标签'];
  if (!raw || raw === '未获取') return [];

  return [...new Set(
    String(raw)
      .split(/[、，,|\/\s]+/)
      .map(t => t.trim())
      .filter(Boolean)
  )];
}

function matchBookChannel(book, selectedChannel) {
  if (!selectedChannel) return true;
  const raw = String(book['频道'] || book['类型'] || '').toLowerCase();
  const target = selectedChannel.toLowerCase();

  if (target === '无cp') return raw.includes('无cp');
  return raw.includes(target);
}

function getBookEra(book) {
  const raw = String(book['类型'] || '').trim();
  if (!raw) return '';

  const parts = raw.split('-').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 3) return parts[2];

  const eraCandidates = ['近代现代', '架空历史', '古色古香', '幻想未来', '现代', '历史'];
  for (const era of eraCandidates) {
    if (raw.includes(era)) return era;
  }
  return '';
}

function getBookNote(book) {
  return notesByBook[String(book['书名'] || '').trim()] || null;
}

function normalizeReadStatus(status) {
  const s = String(status || '').trim();
  return ['已读', '在读', '想读'].includes(s) ? s : '';
}

function getReadStatusBadge(status) {
  const normalized = normalizeReadStatus(status);
  if (!normalized) return '';
  if (normalized === '已读') return '<span class="read-status-badge done">已读</span>';
  if (normalized === '在读') return '<span class="read-status-badge reading">在读</span>';
  return '<span class="read-status-badge todo">想读</span>';
}

function updateReadStats() {
  let done = 0;
  let reading = 0;
  let todo = 0;

  Object.values(notesByBook).forEach(note => {
    const status = normalizeReadStatus(note ? note.status : '');
    if (status === '已读') done++;
    else if (status === '在读') reading++;
    else if (status === '想读') todo++;
  });

  document.getElementById('statTotalBooks').textContent = String(Number.isFinite(bookTotal) ? bookTotal : (allBooks.length || 0));
  document.getElementById('statReadDone').textContent = String(done);
  document.getElementById('statReading').textContent = String(reading);
  document.getElementById('statReadTodo').textContent = String(todo);
}

function normalizeRatingFilter(value) {
  if (!value || value === '全部') return null;
  if (value === '未评分') return 0;
  return parseInt(value, 10) || null;
}

// ── View & Sort ──
function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + mode).classList.add('active');
  renderList();
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  sortFiltered();
  renderList();
  renderPagination();
}

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function sortFiltered() {
  if (sortMode === 'random') {
    shuffleArr(filtered);
  } else if (sortMode === 'fav_desc') {
    filtered.sort((a, b) => parseFavNum(b['收藏数']) - parseFavNum(a['收藏数']));
  } else if (sortMode === 'fav_asc') {
    filtered.sort((a, b) => parseFavNum(a['收藏数']) - parseFavNum(b['收藏数']));
  } else if (sortMode === 'piracy') {
    filtered.sort((a, b) => (b['盗版链接']?.length || 0) - (a['盗版链接']?.length || 0));
  }
}

function togglePanel(name) {
  const panel = document.getElementById(`panel-${name}`);
  if (activePanel && activePanel !== name) {
    document.getElementById(`panel-${activePanel}`).classList.remove('open');
  }
  panel.classList.toggle('open');
  activePanel = panel.classList.contains('open') ? name : null;
}

function toggleChip(el, type) {
  const val = String(el.dataset.val || '').trim();
  const setRef = getChipSetByType(type);
  if (!setRef || !val) return;

  if ((type === 'channel' || type === 'read-status') && val !== '全部') {
    if (setRef.has(val)) {
      setRef.clear();
    } else {
      setRef.clear();
      setRef.add(val);
    }
  } else if (val === '全部') {
    setRef.clear();
  } else if (setRef.has(val)) {
    setRef.delete(val);
  } else {
    setRef.add(val);
  }

  syncChipState(type);
  applyFilter();
}

function toggleFavRange(el) {
  const val = String(el.dataset.val || '').trim();
  if (!val) return;

  const active = el.classList.contains('active');
  const chips = document.querySelectorAll('#favChips .tag-chip');
  chips.forEach(c => c.classList.remove('active'));

  if (active || val === '全部') {
    favMin = 0;
    favMax = 0;
    selectedFavRange = '全部';
    document.getElementById('btnFav').classList.remove('has-value');
  } else {
    selectedFavRange = val;
    document.getElementById('btnFav').classList.add('has-value');
    el.classList.add('active');
    if (val === '5w以下') {
      favMin = 0;
      favMax = 50000;
    } else if (val === '5-20w') {
      favMin = 50000;
      favMax = 200000;
    } else if (val === '20-50w') {
      favMin = 200000;
      favMax = 500000;
    } else if (val === '50-100w') {
      favMin = 500000;
      favMax = 1000000;
    } else if (val === '100w+') {
      favMin = 1000000;
      favMax = 0;
    } else {
      favMin = 0;
      favMax = 0;
    }
  }

  applyFilter();
}

function toggleTag(el) {
  const val = el.dataset.val;
  if (selTags.has(val)) { selTags.delete(val); el.classList.remove('active'); }
  else { selTags.add(val); el.classList.add('active'); }
  document.getElementById('btnTag').classList.toggle('has-value', selTags.size > 0);
  applyFilter();
}

function togglePiracy(el) {
  const val = String(el.dataset.piracy || '').trim();
  if (!val) return;
  if (selPiracy.has(val)) selPiracy.delete(val);
  else selPiracy.add(val);
  el.classList.toggle('active', selPiracy.has(val));
  document.getElementById('btnPiracy').classList.toggle('has-value', selPiracy.size > 0);
  applyFilter();
}

function clearAll() {
  selStatus.clear();
  selReadStatus.clear();
  selReadRating.clear();
  selChannel.clear();
  selType.clear();
  selEra.clear();
  selTags.clear();
  selPiracy.clear();
  favMin = 0;
  favMax = 0;
  selectedFavRange = '全部';
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.classList.remove('has-value'));
  document.querySelectorAll('#favChips .tag-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('btnFav').classList.remove('has-value');
  syncChipState('status');
  syncChipState('read-status');
  syncChipState('read-rating');
  syncChipState('channel');
  syncChipState('type');
  syncChipState('era');
  document.querySelectorAll('#panel-piracy .tag-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('search').value = '';
  applyFilter();
}

function quickFilterTag(tag) {
  if (!tag) return;
  selTags = new Set([tag]);
  document.querySelectorAll('#tagChips .tag-chip').forEach(c => c.classList.remove('active'));
  const target = document.querySelector(`#tagChips .tag-chip[data-val="${CSS.escape(tag)}"]`);
  if (target) target.classList.add('active');
  document.getElementById('btnTag').classList.add('has-value');
  applyFilter();
}

function onFilter() {
  const mediaVisible = document.getElementById('page-media').style.display !== 'none';
  const imagesVisible = document.getElementById('page-images').style.display !== 'none';
  const rankingsVisible = document.getElementById('page-rankings').style.display !== 'none';
  const weeklyVisible = document.getElementById('page-weekly').style.display !== 'none';
  const bookmarksVisible = document.getElementById('page-bookmarks').style.display !== 'none';
  if (mediaVisible) {
    renderMedia();
  } else if (imagesVisible) {
    renderImageBed();
  } else if (rankingsVisible) {
    renderRankings();
  } else if (weeklyVisible) {
    renderWeeklyRankings();
  } else if (bookmarksVisible) {
    renderBookmarks();
  } else {
    applyFilter();
  }
}

function buildBooksQueryParams(page = 1) {
  const params = new URLSearchParams();
  params.set('page', String(page));
  params.set('seed', String(bookSeed));

  const q = String(document.getElementById('search').value || '').trim();
  if (q) params.set('q', q);

  selStatus.forEach(status => params.append('status', status));
  if (selReadStatus.size === 1) params.set('read_status', String([...selReadStatus][0]));
  if (selChannel.size > 0) params.set('channel', String([...selChannel][0]));
  selType.forEach(type => params.append('type', type));
  selEra.forEach(era => params.append('era', era));
  selTags.forEach(tag => params.append('tag', tag));
  selPiracy.forEach(piracy => params.append('piracy', piracy));
  if (favMin > 0) params.set('fav_min', String(favMin));
  if (favMax > 0) params.set('fav_max', String(favMax));

  return params;
}

function resetBookScrollState() {
  bookSeed = Date.now();
  currentPage = 0;
  nextPage = 1;
  allLoaded = false;
  loadMoreStatus = 'idle';
  allBooks = [];
  filtered = [];
  bookTotal = 0;
  bookPageSize = PAGE_SIZE;
  bookTotalPages = 1;

  const list = document.getElementById('list');
  if (list) list.innerHTML = '';

  const loadMoreWrap = document.getElementById('loadMoreWrap');
  if (loadMoreWrap) {
    loadMoreWrap.style.display = 'none';
    loadMoreWrap.innerHTML = '';
  }
}

function setLoadMoreStatus(status) {
  loadMoreStatus = status;
  const wrap = document.getElementById('loadMoreWrap');
  if (!wrap) return;

  if (status === 'loading') {
    wrap.style.display = 'block';
    wrap.innerHTML = '<div class="loading-indicator"><span class="spinner"></span>正在加载...</div>';
  } else if (status === 'done') {
    wrap.style.display = 'block';
    wrap.innerHTML = '<div class="load-complete">已加载全部</div>';
  } else {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
  }
}

function filterBooksByReadStatus(list) {
  if (!selReadStatus.size) return list;
  return list.filter(book => {
    const note = getBookNote(book);
    const status = normalizeReadStatus(note ? note.status : '');
    return status && selReadStatus.has(status);
  });
}

async function fetchBooksPage(page = 1) {
  if (isLoadingMore || allLoaded) return;
  page = Math.max(1, page);

  const params = buildBooksQueryParams(page);
  isLoadingMore = true;
  setLoadMoreStatus('loading');

  try {
    const res = await fetch(`/api/books?${params.toString()}`);
    const payload = await res.json().catch(() => ({}));
    const data = Array.isArray(payload.data) ? payload.data : [];
    const filteredData = filterBooksByReadStatus(data);

    if (page === 1) {
      allBooks = data;
      filtered = filteredData;
    } else {
      allBooks = allBooks.concat(data);
      filtered = filtered.concat(filteredData);
    }

    const totalValue = Number(payload.total);
    const pageSizeValue = Number(payload.page_size);
    bookTotal = Number.isFinite(totalValue) ? totalValue : (Array.isArray(data) ? data.length : 0);
    bookPageSize = Number.isFinite(pageSizeValue) && pageSizeValue > 0 ? pageSizeValue : PAGE_SIZE;
    bookTotalPages = bookPageSize > 0 ? Math.max(1, Math.ceil(bookTotal / bookPageSize)) : 1;
    currentPage = page;
    nextPage = currentPage + 1;

    if (bookTotal > 0 && page * bookPageSize >= bookTotal) {
      allLoaded = true;
      setLoadMoreStatus('done');
    } else {
      allLoaded = false;
      setLoadMoreStatus('idle');
    }

    sortFiltered();
    renderList();
  } catch (e) {
    setLoadMoreStatus('idle');
  } finally {
    isLoadingMore = false;
  }
}

function applyFilter() {
  resetBookScrollState();
  fetchBooksPage(1);
}

function renderList() {
  const list = document.getElementById('list');
  const wrap = document.getElementById('listWrap');
  const paginationWrap = document.getElementById('paginationWrap');
  const total = filtered.length;
  if (document.getElementById('page-books').style.display !== 'none') {
    updateHeaderStats('books');
  }

  if (paginationWrap) paginationWrap.style.display = 'none';

  if (total === 0) {
    list.className = '';
    wrap.classList.remove('grid-mode');
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>没有符合条件的书目</div>';
    return;
  }

  const pageData = filtered;
  if (viewMode === 'grid') {
    wrap.classList.add('grid-mode');
    list.className = 'grid-wrap';
    list.innerHTML = pageData.map((b, i) => renderGridCard(b, i)).join('');
  } else {
    wrap.classList.remove('grid-mode');
    list.className = '';
    list.innerHTML = pageData.map((b, i) => renderCard(b, i)).join('');
  }
}

function renderPagination() {
  const paginationWrap = document.getElementById('paginationWrap');
  if (!paginationWrap) return;
  paginationWrap.style.display = 'none';
}

function goToPage(page) {
  const totalPages = Number.isFinite(bookTotalPages) ? bookTotalPages : 1;
  const nextPage = Math.min(Math.max(1, page), totalPages);
  if (nextPage === currentPage) return;
  fetchBooksPage(nextPage);
}

function jumpToPage() {
  const pageInput = document.getElementById('pageInput');
  if (!pageInput) return;
  const target = Number(pageInput.value);
  if (!Number.isInteger(target) || target < 1) return;
  goToPage(target);
}

function onWindowScroll() {
  if (activeTab !== 'books') return;
  const pageBooks = document.getElementById('page-books');
  if (!pageBooks || pageBooks.style.display === 'none') return;
  if (isLoadingMore || allLoaded) return;

  const scrollBottom = document.documentElement.scrollHeight - (window.scrollY + window.innerHeight);
  if (scrollBottom > 200) return;

  fetchBooksPage(currentPage + 1);
}

// ── Grid Card ──
function renderGridCard(b, idx) {
  const links = b['盗版链接'] || [];
  const note = getBookNote(b);
  const readBadge = getReadStatusBadge(note ? note.status : '');
  const status = b['投诉状态'] || '待投诉';
  const dotClass = status === '已投诉' ? 'done' : status === '未发现盗版' ? 'none-s' : 'pending';
  const tags = getBookTags(b).slice(0, 3);
  const favNum = parseFavNum(b['收藏数']);
  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : (b['收藏数'] || '?');
  return `
  <div class="g-card" onclick="openModal(${idx})">
    <div class="g-status ${dotClass}" title="${status}"></div>
    <div class="g-card-title">${b['书名']}</div>
    <div class="g-card-author">${b['作者']}</div>
    <div class="g-card-tags">
      ${readBadge}
      ${b['类型'] ? `<span class="g-card-tag type">${b['类型']}</span>` : ''}
      ${tags.map(t => `<span class="g-card-tag content" onclick="event.stopPropagation(); quickFilterTag('${String(t).replace(/'/g, "\\'")}')">${t}</span>`).join('')}
    </div>
    <div class="g-card-bottom">
      <span class="g-card-fav">♥ ${favStr}</span>
      <span class="g-piracy ${links.length > 0 ? 'has' : 'none'}">
        ${links.length > 0 ? `${links.length}条盗版` : '未发现'}
      </span>
    </div>
  </div>`;
}

// ── Modal ──

  const favStr = favNum >= 10000 ? `${(favNum/10000).toFixed(1)}万` : (b['收藏数'] || '?');

  const linksHtml = links.length > 0
    ? links.map((url, j) => `
        <div class="link-item">
          <span class="link-num">${j+1}</span>

        </div>`).join('')

    ${b['文章类型'] && b['文章类型'] !== '未获取' ? `<span class="meta-tag" style="color:var(--text2)">${b['文章类型']}</span>` : ''}
    ${tags.map(t => `<span class="meta-tag" style="color:var(--accent);border-color:rgba(168,85,247,.25)">${t}</span>`).join('')}
    <span class="fav-count">♥ ${favStr}</span>`;

  document.getElementById('modalLinks').innerHTML = `<div class="link-list">${linksHtml}</div>`;

  document.getElementById('modalFooter').innerHTML = `
    <span class="footer-label">投诉状态</span>
    <select class="status-select" onchange="updateStatus('${b['书名'].replace(/'/g,"\\'")}', this.value)">
      <option ${status==='待投诉'?'selected':''}>待投诉</option>
      <option ${status==='已投诉'?'selected':''}>已投诉</option>
      <option ${status==='未发现盗版'?'selected':''}>未发现盗版</option>
    </select>
    <a href="${b['晋江链接']}" target="_blank" class="jj-link">晋江原文 →</a>

    <div class="notes-section">
      <div class="notes-title">读后感</div>
      <div class="notes-row">
        <span class="notes-label">阅读状态</span>
        <select class="status-select" id="noteStatus">
          <option>想读</option>
          <option>在读</option>
          <option>已读</option>
        </select>
      </div>
      <div class="notes-row">
        <span class="notes-label">评分</span>
        <div class="star-rating" id="noteStars"></div>
      </div>
      <textarea id="noteText" class="notes-textarea" placeholder="写下你的读后感..."></textarea>
      <div class="notes-actions">
        <button class="btn-save-note" id="noteSaveBtn" onclick="saveCurrentNote()">保存笔记</button>
        <span class="save-tip" id="noteSaveTip"></span>
      </div>
    </div>`;

  renderRatingStars(0);
  loadNoteForBook(b['书名']);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModalBook = null;
  currentModalRating = 0;
}

function renderRatingStars(rating) {
  currentModalRating = rating;
  const box = document.getElementById('noteStars');
  if (!box) return;
  box.innerHTML = [1,2,3,4,5].map(i =>
    `<button class="star-btn ${i <= rating ? 'active' : ''}" onclick="setModalRating(${i})" type="button">★</button>`
  ).join('');
}

function setModalRating(rating) {
  renderRatingStars(rating);
}

async function loadNoteForBook(bookName) {
  try {
    const res = await fetch(`/api/notes/${encodeURIComponent(bookName)}`);
    const payload = await res.json();
    const data = payload && payload.data ? payload.data : null;

    if (!data) {
      renderRatingStars(0);
      const statusEl = document.getElementById('noteStatus');
      const noteEl = document.getElementById('noteText');
      if (statusEl) statusEl.value = '想读';
      if (noteEl) noteEl.value = '';
      return;
    }

    const statusEl = document.getElementById('noteStatus');
    const noteEl = document.getElementById('noteText');
    if (statusEl && ['想读','在读','已读'].includes(data.status)) statusEl.value = data.status;
    if (noteEl) noteEl.value = data.note || '';
    renderRatingStars(Number(data.rating) || 0);
  } catch (e) {
    console.error('加载读后感失败', e);
  }
}

async function saveCurrentNote() {
  if (!currentModalBook) return;

  const statusEl = document.getElementById('noteStatus');
  const noteEl = document.getElementById('noteText');
  const btnEl = document.getElementById('noteSaveBtn');

  const payload = {
    book_name: currentModalBook['书名'],
    author: currentModalBook['作者'],
    rating: currentModalRating,
    status: statusEl ? statusEl.value : '想读',
    note: noteEl ? noteEl.value : '',
  };

  try {
    const res = await fetch('/api/notes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });

    const result = await res.json().catch(() => null);
    if (!res.ok || !result || result.ok !== true) throw new Error('save failed');

    notesByBook[currentModalBook['书名']] = {
      book_name: currentModalBook['书名'],
      author: currentModalBook['作者'],
      rating: currentModalRating,
      status: statusEl ? statusEl.value : '想读',
      note: noteEl ? noteEl.value : '',
    };
    updateReadStats();
    applyFilter();
    closeModal();

    // 更改按钮状态
    if (btnEl) {
      const originalText = btnEl.textContent;
      btnEl.textContent = '已保存✓';
      btnEl.classList.add('saved');
      btnEl.disabled = true;
      
      setTimeout(() => {
        btnEl.textContent = originalText;
        btnEl.classList.remove('saved');
        btnEl.disabled = false;
      }, 2000);
    }
  } catch (e) {
    console.error('保存读后感失败', e);
    if (btnEl) {
      btnEl.textContent = '保存失败';
      setTimeout(() => {
        btnEl.textContent = '保存笔记';
      }, 1500);
    }
  }
}

        </span>
        <span class="chevron" id="chev-${idx}">▶</span>

function copyUrl(btn, url) {

}

function normalizeMediaCategory(raw) {
  const text = String(raw || '').trim();
  if (!text) return '电影';
  if (text.includes('图书')) return '图书';
  if (text.includes('电视剧')) return '电视剧';
  if (text.includes('动画')) return '动画电影';
  if (text.includes('电影')) return '电影';
  return text;
}

function buildMediaCategories() {
  const categories = ['全部', '电影', '图书', '电视剧', '动画电影'];
  const sorts = [
    { label: '默认顺序', value: '' },
    { label: '评分高到低', value: 'rating_desc' },
    { label: '评分低到高', value: 'rating_asc' },
  ];
  const row = document.getElementById('mediaCategoryRow');
  const categoryHtml = categories.map((item, idx) =>
    `<button class="filter-btn ${idx === 0 ? 'active' : ''}" data-media-category="${item}" onclick="setMediaCategory('${item}')">${item}</button>`
  ).join('');

  const sortHtml = sorts.map(item =>
    `<button class="filter-btn ${item.value === '' ? 'active' : ''}" data-media-sort="${item.value}" onclick="setMediaSort('${item.value}')">${item.label}</button>`
  ).join('');

  row.innerHTML = `${categoryHtml}<span class="ctrl-label" style="align-self:center;margin:0 2px 0 6px;">排序</span>${sortHtml}`;
}

function setMediaCategory(category) {
  mediaCategory = category === '全部' ? '' : category;
  document.querySelectorAll('#mediaCategoryRow [data-media-category]').forEach(btn => btn.classList.remove('active'));
  const current = mediaCategory || '全部';
  const target = document.querySelector(`#mediaCategoryRow .filter-btn[data-media-category="${current}"]`);
  if (target) target.classList.add('active');
  renderMedia();
}

function setMediaSort(mode) {
  mediaSortMode = mode || '';
  document.querySelectorAll('#mediaCategoryRow [data-media-sort]').forEach(btn => btn.classList.remove('active'));
  const target = document.querySelector(`#mediaCategoryRow .filter-btn[data-media-sort="${mediaSortMode}"]`);
  if (target) target.classList.add('active');
  renderMedia();
}

function mediaTitle(item) {
  return item.title || item.name || item['标题'] || '未命名';
}

function mediaDesc(item) {
  return item.description || item.summary || item.intro || item['简介'] || '暂无简介';
}

function mediaCover(item) {
  return item.cover || item.poster || item.image || item['封面'] || '';
}

function hashText(value) {
  const str = String(value || '');
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash + str.charCodeAt(i)) | 0;
  }
  return Math.abs(hash);
}

function mediaCoverStyleByTitle(title) {
  const seed = hashText(title);
  const h1 = seed % 360;
  const h2 = (h1 + 38 + (seed % 64)) % 360;
  const c1 = `hsl(${h1}, 72%, 56%)`;
  const c2 = `hsl(${h2}, 78%, 44%)`;
  return `background: linear-gradient(135deg, ${c1}, ${c2});`;
}

function mediaSource(item) {
  return item.source || item['来源'] || '豆瓣';
}

function mediaRating(item) {
  const value = Number(item.rating || item['评分'] || 0);
  return Number.isFinite(value) && value > 0 ? value.toFixed(1) : '暂无';
}

function mediaRatingValue(item) {
  const value = Number(item.rating || item['评分']);
  return Number.isFinite(value) && value > 0 ? value : null;
}

function escHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderMedia() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  mediaFiltered = (Array.isArray(allMedia) ? allMedia : []).filter(item => {
    const category = normalizeMediaCategory(item.category || item['分类']);
    if (mediaCategory && category !== mediaCategory) return false;
    if (!q) return true;
    const title = mediaTitle(item).toLowerCase();
    const desc = mediaDesc(item).toLowerCase();
    return title.includes(q) || desc.includes(q);
  });

  if (mediaSortMode) {
    mediaFiltered.sort((a, b) => {
      const aVal = mediaRatingValue(a);
      const bVal = mediaRatingValue(b);
      if (aVal === null && bVal === null) return 0;
      if (aVal === null) return 1;
      if (bVal === null) return -1;
      return mediaSortMode === 'rating_desc' ? bVal - aVal : aVal - bVal;
    });
  }

  const grid = document.getElementById('mediaGrid');
  if (!mediaFiltered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📚</div>没有符合条件的素材</div>';
    if (document.getElementById('page-media').style.display !== 'none') updateHeaderStats('media');
    return;
  }

  grid.innerHTML = mediaFiltered.map((item, idx) => {
    const title = mediaTitle(item);
    const source = mediaSource(item);
    const desc = mediaDesc(item);
    const rating = mediaRating(item);
    const watched = !!item.watched;
    const safeTitle = escHtml(title);
    const safeSource = escHtml(source);
    const safeDesc = escHtml(desc);

    return `
      <div class="media-card">
        <div class="media-cover" style="${mediaCoverStyleByTitle(title)}">
          <div class="media-cover-title">${safeTitle}</div>
        </div>
        <div class="media-body">
          <div class="media-title">${safeTitle}</div>
          <div class="media-meta">
            <span class="media-rating">★ ${rating}</span>
            <span class="media-source">${safeSource}</span>
          </div>
          <div class="media-desc">${safeDesc}</div>
          <div class="media-actions">
            <label class="media-check">
              <input type="checkbox" ${watched ? 'checked' : ''} onchange="toggleMediaWatched(${idx}, this.checked)">
              已看
            </label>
            <button class="btn-note" onclick="openMediaNoteModal(${idx})">写笔记</button>
          </div>
        </div>
      </div>`;
  }).join('');

  if (document.getElementById('page-media').style.display !== 'none') updateHeaderStats('media');
}

async function toggleMediaWatched(idx, checked) {
  const item = mediaFiltered[idx];

  item.watched = !!checked;
  await fetch('/api/media/note', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title: mediaTitle(item),
      watched: item.watched,
      tags: item.tags || '',
      note: item.note || '',
    }),
  });
}
